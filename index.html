  function prepareForStorage(data) {
    if (Array.isArray(data)) {
        return data.map(item => {
            if (typeof item.id === 'number' || typeof item.id === 'string' && item.id.includes('.')) {
                return { ...item, id: String(item.id).replace('.', '-') };
            }
            return item;
        });
    }
    return data;
  }
  
  function prepareFromStorage(data) {
    if (Array.isArray(data)) {
        return data.map(item => ({
            ...item,
            id: typeof item.id === 'string' && item.id.includes('-') ? parseFloat(item.id.replace('-', '.')) : item.id
        }));
    }
    return data;
  }
  
  function storageGet(key, fallback=null){ 
    try {
      const data = localStorage.getItem(key);
      if (data === null) return fallback;
      let parsedData = JSON.parse(data);
      if (key === 'produtos' && parsedData) {
        parsedData = prepareFromStorage(parsedData);
      }
      return parsedData;
    } catch(e){ 
      console.error('Erro ao ler localStorage:', e);
      return fallback; 
    }
  }

  // --- FUNÇÃO DE SALVAR (AGORA COM NUVEM) ---
  function storageSet(key, value){ 
    try {
      // Trava de segurança para não apagar o banco se carregar vazio
      if (!value || (Array.isArray(value) && value.length === 0)) {
          if (key === 'produtos' || key === 'insumos' || key === 'usuarios') return; 
      }

      let dataToSet = value;
      if (key === 'produtos') { dataToSet = prepareForStorage(value); }
      
      // Envia 100% para o Firebase, sem localStorage

  function calcularCusto(item, insumosMap) {
      if (!item.fichaTecnica || item.fichaTecnica.length === 0) return 0;
      let custoTotal = 0;
      item.fichaTecnica.forEach(insumoRef => {
          const insumoData = insumosMap[insumoRef.idInsumo];
          if (insumoData) {
              custoTotal += insumoRef.quantidade * insumoData.custoUnitario;
          }
      });
      return custoTotal;
  }
  
  function getFlatMenu(menu, insumos) {
      const insumosMap = insumos.reduce((map, i) => { map[i.id] = i; return map; }, {});

      const imageMap = {
          101: 'img/burger.jpg', 102: 'img/bacon-burger.jpg',
          201: 'img/batata.jpg', 202: 'img/batata-cheddar.jpg', 203: 'img/combinho.jpg',
          301: 'img/guarana.jpg', 302: 'img/coca.jpg', 303: 'img/coca-zero.jpg', 304: 'img/coca600.jpg', 305: 'img/cerveja.jpg',
          401: 'img/acai.jpg', 402: 'img/acai.jpg', 403: 'img/acai.jpg', 404: 'img/acai.jpg'
      };

      let flatItems = [];
      for (const category in menu) {
          menu[category].forEach(item => {
              const defaultImageUrl = `https://via.placeholder.com/400x150?text=${encodeURIComponent(item.emoji || item.nome.split(' ')[0])}`;
              const custo = calcularCusto(item, insumosMap);
              
              if (item.opcoes) {
                  item.opcoes.forEach(opcao => {
                      flatItems.push({
                          id: parseFloat(opcao.id),
                          nome: `${item.nome} (${opcao.nomeOpcao})`,
                          preco: opcao.preco,
                          emoji: item.emoji,
                          categoria: item.categoria,
                          estoque: 9999,
                          manutencao: item.manutencao || false,
                          baseId: item.id,
                          imagemUrl: imageMap[parseFloat(opcao.id)] || defaultImageUrl,
                          custoProduto: custo, 
                          fichaTecnica: item.fichaTecnica 
                      });
                  });
              } else {
                  flatItems.push({ 
                    id: item.id, 
                    nome: item.nome, 
                    preco: item.preco, 
                    emoji: item.emoji, 
                    categoria: item.categoria,
                    estoque: item.manutencao ? 0 : 9999,
                    manutencao: item.manutencao || false,
                    imagemUrl: imageMap[item.id] || defaultImageUrl,
                    custoProduto: custo, 
                    fichaTecnica: item.fichaTecnica 
                  });
              }
          });
      }
      return flatItems;
  }
  
  function darBaixaInsumos(carrinho, produtos, insumos, setInsumos) {
      const insumosMap = insumos.reduce((map, i) => { map[i.id] = {...i}; return map; }, {});
      let custoTotalVenda = 0;

      for (const item of carrinho) {
          const produtoBase = produtos.find(p => p.id === item.id);
          if (!produtoBase || !produtoBase.fichaTecnica) continue;

          for (const insumoRef of produtoBase.fichaTecnica) {
              const insumoData = insumosMap[insumoRef.idInsumo];
              if (insumoData) {
                  const quantidadeBaixa = insumoRef.quantidade * item.quantidade;
                  insumoData.estoque -= quantidadeBaixa;
                  
                  custoTotalVenda += quantidadeBaixa * insumoData.custoUnitario;
              }
          }
      }
      
      const novosInsumos = Object.values(insumosMap);
      setInsumos(novosInsumos);
      return custoTotalVenda;
  }

    // FUNÇÃO QUE MANDA PRA COZINHA
    async function handleImprimirCozinha() {
        if (pedidosNaoImpressos.length === 0) {
            return alert("✅ Todos os itens desta mesa já foram impressos para a cozinha!");
        }

        // 1. Abre a tela de imprimir o formato Cozinha
        imprimirCupomCozinha(mesa, pedidosNaoImpressos);

        // 2. Marca no banco de dados que já foi impresso (para não imprimir de novo na próxima vez)
        const batch = db.batch();
        pedidosNaoImpressos.forEach(p => {
            const docRef = db.collection("pedidos").doc(p.id.toString());
            // Atualiza para 'impressoCozinha: true'

        });

                        <button onClick={() => { fecharConta(mesa, pedidosMesa, totalMesa, 'Pix'); setModoFechamento(false); }} className="py-4 bg-teal-600 text-white rounded-xl font-bold shadow-md">💠 Pix</button>
                        <button onClick={() => { fecharConta(mesa, pedidosMesa, totalMesa, 'Cartão'); setModoFechamento(false); }} className="py-4 bg-blue-600 text-white rounded-xl font-bold shadow-md">💳 Cartão</button>
                    </div>
                    <button onClick={() => setModoFechamento(false)} className="mt-8 text-gray-500 font-bold hover:underline">Cancelar e Voltar</button>
                </div>
            </div>
        )
    }

    return (
        <div className="p-6 bg-slate-50 min-h-full flex flex-col">
            <div className="flex items-center justify-between mb-6 border-b pb-4">
                <div className="flex items-center gap-4">
                    <button onClick={voltarMapa} className="bg-gray-200 px-4 py-2 rounded-lg font-bold">← Voltar</button>
                    <h2 className="text-3xl font-extrabold text-gray-800 flex items-center gap-2">
            Detalhes: <span className="text-terracota">{mesa}</span>
            {/* 👇 BLOCO PARA INSERIR/EDITAR NOME */}
            {editandoNome ? (
                <div className="flex items-center gap-2 ml-2">
                    <input autoFocus value={inputNome} onChange={e=>setInputNome(e.target.value)} placeholder="Nome do Cliente" className="text-lg p-1 border-2 border-terracota rounded w-40 outline-none" />
                    <button onClick={() => { atualizarNomeMesa(mesa, inputNome); setEditandoNome(false); }} className="bg-green-500 hover:bg-green-600 text-white text-sm px-3 py-1 rounded font-bold">Salvar</button>
                    <button onClick={() => { setInputNome(nomesMesas[mesa] || ''); setEditandoNome(false); }} className="bg-red-500 hover:bg-red-600 text-white text-sm px-2 py-1 rounded font-bold">X</button>
                </div>
            ) : (
                <span onClick={() => setEditandoNome(true)} className="ml-2 text-xl text-blue-600 cursor-pointer bg-blue-50 px-3 py-1 rounded-lg hover:bg-blue-100 border border-blue-200 shadow-sm transition">
                    {nomesMesas[mesa] ? `👤 ${nomesMesas[mesa]}` : '✏️ Nome'}
                </span>
            )}
        </h2>
                </div>
                <div className="text-2xl font-bold bg-white px-6 py-2 rounded-xl shadow border border-gray-200">Total: {currency(totalMesa)}</div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1">
                <div className="lg:col-span-2 bg-white rounded-2xl shadow p-4 flex flex-col">
                    <div className="flex justify-between items-center mb-4 border-b pb-2">
                        <h3 className="text-lg font-bold">Itens na Conta</h3>
                        {pedidosNaoImpressos.length > 0 && (
                            <span className="bg-red-100 text-red-700 text-xs font-bold px-3 py-1 rounded-full animate-pulse">
                                Há pedidos aguardando impressão!
                            </span>
                        )}
                    </div>
                    
                    <div className="flex-1 overflow-y-auto space-y-3">
                        {pedidosMesa.length === 0 ? <div className="text-center text-gray-500 py-10 italic">Nenhum pedido feito para esta mesa ainda.</div> : pedidosMesa.map(pedido => (
                            <div key={pedido.id} className={`border rounded-lg p-3 ${!pedido.impressoCozinha ? 'bg-orange-50 border-orange-300' : 'bg-gray-50 border-gray-200'}`}>
                                <div className="flex justify-between items-center mb-2">
                                    <span className={`text-xs font-bold uppercase px-2 py-1 rounded ${!pedido.impressoCozinha ? 'bg-orange-500 text-white' : 'bg-gray-300 text-gray-700'}`}>
                                        {!pedido.impressoCozinha ? 'NOVO (Não Impresso) ⚠️' : 'Já Enviado p/ Cozinha ✅'}
                                    </span>
                                    <span className="text-xs text-gray-500">{new Date(pedido.data).toLocaleTimeString()}</span>
                                </div>
                                <ul className="text-sm ml-2 mt-3 space-y-2">
                                    {pedido.itens.map((item, idx) => (
                                        <li key={idx} className="flex justify-between items-center bg-white p-2 rounded border border-gray-200 shadow-sm">
                                            <div className="flex items-center gap-2">
                                                {/* Botões de controle de quantidade */}
                                                <div className="flex items-center bg-gray-100 rounded border border-gray-300 overflow-hidden">
                                                    <button onClick={() => alterarQtdItemMesa(pedido.id, idx, -1)} className="px-2 py-1 bg-white hover:bg-gray-200 text-red-600 font-bold transition">-</button>
                                                    <span className="w-6 text-center font-bold text-gray-800">{item.quantidade}</span>
                                                    <button onClick={() => alterarQtdItemMesa(pedido.id, idx, 1)} className="px-2 py-1 bg-white hover:bg-gray-200 text-green-600 font-bold transition">+</button>
                                                </div>
                                                <span className="font-medium text-gray-700">{item.nome}</span>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className="font-semibold">{currency(item.preco * item.quantidade)}</span>
                                                <button onClick={() => removerItemMesa(pedido.id, idx)} className="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 border border-red-200 px-2 py-1 rounded text-xs font-bold transition">
                                                    Excluir
                                                </button>
                                            </div>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        ))}
                    </div>
                </div>

                <div className="space-y-3">
                    <button onClick={() => novoPedido(mesa)} className="w-full py-4 bg-terracota hover:bg-redBrown text-white rounded-xl font-bold text-lg shadow transition">➕ Novo Pedido</button>
                    
                    {/* BOTÕES DE IMPRESSÃO DIVIDIDOS */}
                    <div className="grid grid-cols-2 gap-2">
                        <button onClick={handleImprimirCozinha} disabled={totalMesa===0} className="py-3 bg-orange-500 hover:bg-orange-600 text-white rounded-xl font-bold shadow flex flex-col items-center justify-center">
                            <span className="text-xl mb-1">👨‍🍳</span><span className="text-sm">Imp. Cozinha</span>
                        </button>
                        <button onClick={() => imprimirCupom(mesa, itensAgrupados, totalMesa, 'Conta Parcial')} disabled={totalMesa===0} className="py-3 bg-gray-800 hover:bg-black text-white rounded-xl font-bold shadow flex flex-col items-center justify-center">
                            <span className="text-xl mb-1">🖨️</span><span className="text-sm">Imp. Conta</span>
                        </button>
                    </div>

                    <button onClick={() => setModoTransferencia(true)} disabled={totalMesa===0} className="w-full py-3 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded-xl font-bold shadow transition">🔄 Transferir Mesa</button>
                    
                    <div className="bg-white rounded-2xl shadow p-4 border border-gray-100">
                        <h4 className="font-bold mb-2">Resumo</h4>
                        <div className="flex justify-between text-xl font-bold border-t pt-2 mb-4 text-green-700"><span>Total Geral</span><span>{currency(totalMesa)}</span></div>
                        <button 
                            onClick={() => {
                                if (totalMesa === 0) {
                                    if(confirm('A mesa está sem itens. Deseja liberar a mesa e limpar o nome do cliente?')) {
                                        atualizarNomeMesa(mesa, null);
                                        voltarMapa();
                                    }
                                } else {
                                    setModoFechamento(true);
                                }
                            }} 
                            className={`w-full py-4 rounded-xl font-bold text-white text-lg shadow-lg transition ${totalMesa > 0 ? 'bg-green-600 hover:bg-green-700' : 'bg-orange-500 hover:bg-orange-600'}`}
                        >
                            {totalMesa > 0 ? '💰 Fechar Conta' : '🧹 Liberar Mesa (Vazia)'}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    );
  }

  /*********************
   * Gestão de Usuários (Acesso Seguro - Firebase Auth)
   *********************/
  function UsuariosView() {
      const [usuarios, setUsuarios] = useState([]);
      const [form, setForm] = useState({ email: '', password: '', role: 'vendedor', nome: '' });
      const [carregando, setCarregando] = useState(false);

      useEffect(() => {
          db.collection("dados_restaurante").doc("usuarios").get().then(doc => {
              if (doc.exists && doc.data().dados) {
                  setUsuarios(JSON.parse(doc.data().dados));
              }
          });
      }, []);

      async function submit(e) {
          e.preventDefault();
          setCarregando(true);
          try {
              const secondaryApp = firebase.initializeApp(firebaseConfig, "SecondaryApp" + Date.now());
              await secondaryApp.auth().createUserWithEmailAndPassword(form.email, form.password);
              await secondaryApp.auth().signOut();
              await secondaryApp.delete();

              const novoUsuario = { email: form.email.toLowerCase(), nome: form.nome, role: form.role };
              const novos = [...usuarios, novoUsuario];
              
              setUsuarios(novos);
              
              db.collection("dados_restaurante").doc("usuarios").set({
                  dados: JSON.stringify(novos),
                  ultimaAtualizacao: firebase.firestore.FieldValue.serverTimestamp()
              });
              
              setForm({ email: '', password: '', role: 'vendedor', nome: '' });
              alert('Usuário cadastrado com sucesso! Ele já pode logar no sistema.');
          } catch (err) {
              alert('Erro ao criar usuário: ' + err.message);
          } finally {
              setCarregando(false);
          }
      }

      function remover(email) {
          if(!email) return; // Trava contra usuários sem e-mail

          // TRAVA EXTRA DE SEGURANÇA: Impede exclusão da sua conta
          if(String(email).toLowerCase() === 'alexgoncalves_21@hotmail.com') {
              alert("Operação não permitida.");
              return;
          }

          if(!confirm('Deseja bloquear o acesso deste e-mail ao sistema?\n\nDica de Segurança: Para excluir a conta definitivamente, vá no painel do Firebase > Authentication e delete o e-mail lá também.')) return;
          
          const novos = usuarios.filter(u => u.email !== email);
          setUsuarios(novos);
          
          db.collection("dados_restaurante").doc("usuarios").set({
              dados: JSON.stringify(novos),
              ultimaAtualizacao: firebase.firestore.FieldValue.serverTimestamp()
          });
      }

      // FILTRO FANTASMA: Limpa os bugs velhos e esconde a sua conta master
      const usuariosVisiveis = usuarios.filter(u => {
          // 1. Esconde qualquer usuário bugado/antigo que não tenha e-mail gravado
          if (!u.email) return false; 
          // 2. Esconde a sua conta mestre para o cliente não ver
          if (String(u.email).toLowerCase() === 'alexgoncalves_21@hotmail.com') return false; 
          
          return true;
      });

      return (
          <div className="p-6 space-y-6">
              <h2 className="text-3xl font-extrabold text-gray-800 border-b pb-2">👥 Controle de Acesso (Seguro)</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <form onSubmit={submit} className="bg-white p-6 rounded-2xl shadow border h-fit space-y-4">
                      <h3 className="font-bold text-lg text-terracota">Novo Acesso</h3>
                      <input value={form.nome} onChange={e=>setForm({...form, nome:e.target.value})} placeholder="Nome do Funcionário (Ex: João)" className="w-full p-3 border rounded-xl" required />
                      <input type="email" value={form.email} onChange={e=>setForm({...form, email:e.target.value})} placeholder="E-mail de Login" className="w-full p-3 border rounded-xl" required />
                      <input value={form.password} onChange={e=>setForm({...form, password:e.target.value})} placeholder="Senha (Mín. 6 caracteres)" type="text" className="w-full p-3 border rounded-xl" required minLength="6" />
                      <select value={form.role} onChange={e=>setForm({...form, role:e.target.value})} className="w-full p-3 border rounded-xl">
                          <option value="vendedor">Vendedor / Caixa (Acesso Limitado)</option>
                          <option value="admin">Administrador (Acesso Total)</option>
                      </select>
                      <button disabled={carregando} className="w-full py-3 bg-gray-800 text-white rounded-xl font-bold disabled:opacity-50">
                          {carregando ? 'Criando Autenticação...' : 'Criar Acesso'}
                      </button>
                  </form>
                  
                  <div className="md:col-span-2 bg-white p-6 rounded-2xl shadow border">
                      <h3 className="font-bold text-lg text-gray-700 mb-4">Acessos Permitidos</h3>
                      <div className="space-y-3">
                          {usuariosVisiveis.map((u, i) => (
                              <div key={i} className="flex justify-between items-center p-3 bg-gray-50 border rounded-lg">
                                  <div>
                                      <div className="font-bold text-lg">{u.nome || 'Sem Nome'} <span className="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded uppercase ml-2">{u.role}</span></div>
                                      <div className="text-sm text-gray-500">{u.email}</div>
                                  </div>
                                  <button onClick={()=>remover(u.email)} className="text-red-500 hover:text-red-700 font-bold">Bloquear</button>
                              </div>
                          ))}
                          {usuariosVisiveis.length === 0 && <p className="text-gray-400 text-sm">Nenhum funcionário extra cadastrado.</p>}
                      </div>
                  </div>
              </div>
          </div>
      )
  }

  /*********************
   * Caixa Diário / Turno (Vendedor e Admin)
   *********************/
  function CaixaTurnoView({ user, caixaAtual, setCaixaAtual, vendas }) {
      const [troco, setTroco] = useState('');

      function abrirCaixa() {
          if(troco === '') return alert('Informe o fundo de troco inicial.');
          const novoCaixa = { id: uid(), dataAbertura: new Date().toISOString(), operador: user.username, saldoInicial: Number(troco) };
          setCaixaAtual(novoCaixa);
          storageSet('caixa_atual', novoCaixa);
      }

      function fecharCaixa() {
          if(!confirm('Tem certeza que deseja fechar o turno? O caixa será zerado.')) return;
          setCaixaAtual(null);
          storageSet('caixa_atual', null);
          alert('Caixa fechado com sucesso. Relatório de turno salvo no Histórico!');
      }

      if(!caixaAtual) {
          return (
              <div className="p-8 flex items-center justify-center min-h-[70vh]">
                  <div className="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center border-t-8 border-terracota">
                      <h2 className="text-2xl font-extrabold mb-2">Abrir Caixa</h2>
                      <p className="text-gray-500 text-sm mb-6">Inicie seu turno informando o troco na gaveta.</p>
                      <input type="number" step="0.01" value={troco} onChange={e=>setTroco(e.target.value)} placeholder="Fundo de Troco (R$)" className="w-full p-4 text-center text-xl font-bold border rounded-xl mb-4 bg-gray-50" />
                      <button onClick={abrirCaixa} className="w-full py-4 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold shadow-lg transition text-lg">🔓 ABRIR CAIXA</button>
                  </div>
              </div>
          )
      }

      // Calcula os valores apenas para este turno
      const vendasTurno = vendas.filter(v => v.turnoId === caixaAtual.id);
      const ttDinheiro = vendasTurno.filter(v=>v.metodoPagamento==='Dinheiro').reduce((a,b)=>a+b.total, 0);
      const ttPix = vendasTurno.filter(v=>v.metodoPagamento==='Pix').reduce((a,b)=>a+b.total, 0);
      const ttCartao = vendasTurno.filter(v=>v.metodoPagamento==='Cartão').reduce((a,b)=>a+b.total, 0);
      const totalVendido = ttDinheiro + ttPix + ttCartao;

      return (
          <div className="p-6 space-y-6">
              <div className="flex justify-between items-center border-b pb-4">
                  <div>
                      <h2 className="text-3xl font-extrabold text-gray-800">🏧 Meu Caixa Atual</h2>
                      <p className="text-sm text-gray-500 mt-1">Operador: <b className="text-terracota">{caixaAtual.operador}</b> | Abertura: {new Date(caixaAtual.dataAbertura).toLocaleString()}</p>
                  </div>
                  <button onClick={fecharCaixa} className="px-6 py-3 bg-red-600 hover:bg-red-700 text-white rounded-xl font-bold shadow-lg">🔒 FECHAR CAIXA</button>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                  <div className="bg-white p-5 rounded-2xl shadow border-l-4 border-gray-400">
                      <div className="text-xs font-bold text-gray-500 uppercase">Fundo Inicial (Troco)</div>
                      <div className="text-2xl font-bold text-gray-700">{currency(caixaAtual.saldoInicial)}</div>
                  </div>
                  <div className="bg-white p-5 rounded-2xl shadow border-l-4 border-green-500">
                      <div className="text-xs font-bold text-gray-500 uppercase">Vendas Dinheiro</div>
                      <div className="text-2xl font-bold text-green-700">{currency(ttDinheiro)}</div>
                  </div>
                  <div className="bg-white p-5 rounded-2xl shadow border-l-4 border-teal-500">
                      <div className="text-xs font-bold text-gray-500 uppercase">Vendas Pix</div>
                      <div className="text-2xl font-bold text-teal-700">{currency(ttPix)}</div>
                  </div>
                  <div className="bg-white p-5 rounded-2xl shadow border-l-4 border-blue-500">
                      <div className="text-xs font-bold text-gray-500 uppercase">Vendas Cartão</div>
                      <div className="text-2xl font-bold text-blue-700">{currency(ttCartao)}</div>
                  </div>
              </div>

              <div className="bg-gray-800 text-white p-6 rounded-2xl shadow flex justify-between items-center">
                  <div>
                      <div className="text-sm text-gray-400">Total Vendido no Turno</div>
                      <div className="text-3xl font-bold text-terracota">{currency(totalVendido)}</div>
                  </div>
                  <div className="text-right">
                      <div className="text-sm text-gray-400">Dinheiro na Gaveta (Troco + Vendas)</div>
                      <div className="text-3xl font-bold text-green-400">{currency(caixaAtual.saldoInicial + ttDinheiro)}</div>
                  </div>
              </div>
          </div>
      )
  }

  /*********************
   * Dashboard View
   *********************/
  function DashboardView({ vendas, perdas, produtos }) {
      const areaRef = useRef(null);
      const pieRef = useRef(null);
      
      const salesData = useMemo(() => {
          let totalSales = 0;
          let totalCosts = 0;
          let totalLosses = 0;
          let totalTickets = vendas.length;
          
          vendas.forEach(v => {
              totalSales += v.total;
              totalCosts += v.custoVenda || 0;
          });
          
          perdas.forEach(p => {
              totalLosses += p.custoTotal;
          });
          
          const totalProfit = totalSales - totalCosts - totalLosses;
          const averageTicket = totalTickets > 0 ? totalSales / totalTickets : 0;
          const averageProfit = totalTickets > 0 ? totalProfit / totalTickets : 0;
          
          return { totalSales, totalCosts, totalLosses, totalTickets, totalProfit, averageTicket, averageProfit };
      }, [vendas, perdas]);

      const dailySalesChartData = useMemo(() => {
        const map = {};
        vendas.forEach(v => {
          const day = v.data.split('T')[0];
          map[day] = (map[day] || 0) + v.total;
        });
        const arr = Object.entries(map).map(([d, t]) => ({ date: d, receita: t }));
        arr.sort((a, b) => a.date.localeCompare(b.date));
        return arr;
      }, [vendas]);
      
      const categorySalesChartData = useMemo(() => {
          const map = {};
          vendas.forEach(v => {
              v.itens.forEach(item => {
                  const product = produtos.find(p => p.id === item.id);
                  if (product) {
                      map[product.categoria] = (map[product.categoria] || 0) + item.preco * item.quantidade;
                  }
              });
          });
          return Object.entries(map).map(([categoria, total]) => ({ categoria, total }));
      }, [vendas, produtos]);

      useEffect(() => {
          if (areaRef.current && areaRef.current._chart) { try { areaRef.current._chart.destroy(); } catch { } }
          
          if (areaRef.current && dailySalesChartData.length > 0) {
              const ctx = areaRef.current.getContext('2d');
              const labels = dailySalesChartData.map(s => new Date(s.date).toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' }));
              const dataReceita = dailySalesChartData.map(s => s.receita);
              
              const backgroundColors = dataReceita.map(r => '#e4593c'); 
              const borderColors = dataReceita.map(r => '#a93131');
              
              areaRef.current._chart = new Chart(ctx, {
                  type: 'bar',
                  data: { 
                      labels, 
                      datasets: [{ 
                          label: 'Receita (R$)', 
                          data: dataReceita, 
                          backgroundColor: backgroundColors, 
                          borderColor: borderColors,
                          borderWidth: 1,
                          barThickness: 15,
                      }] 
                  },
                  options: { 
                      responsive: true, 
                      maintainAspectRatio: false,
                      plugins: { legend: { display: false } },
                      scales: {
                          x: { grid: { display: false } },
                          y: { beginAtZero: true }
                      }
                  }
              });
          }
      }, [dailySalesChartData]);

      useEffect(() => {
          if (pieRef.current && pieRef.current._chart) { try { pieRef.current._chart.destroy(); } catch { } }

          if (pieRef.current && categorySalesChartData.length > 0) {
              const ctx = pieRef.current.getContext('2d');
              const labels = categorySalesChartData.map(d => d.categoria);
              const data = categorySalesChartData.map(d => d.total);
              const backgroundColors = [
                '#e4593c', '#a93131', '#fcd34d', '#10b981', '#3b82f6', '#f97316'
              ];

              pieRef.current._chart = new Chart(ctx, {
                  type: 'doughnut',
                  data: { 
                      labels, 
                      datasets: [{ 
                          data, 
                          backgroundColor: backgroundColors, 
                          borderColor: '#fff',
                          borderWidth: 2,
                      }] 
                  },
                  options: { 
                      responsive: true, 
                      maintainAspectRatio: false,
                      plugins: { legend: { position: 'bottom' } }
                  }
              });
          }
      }, [categorySalesChartData]);

      return (
          <div className="p-6 bg-slate-50 min-h-full">
              <div className="flex justify-between items-center border-b pb-4 mb-6">
                  <h2 className="text-2xl font-bold text-gray-800">Painel de Vendas - {new Date().toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' })}</h2>
              </div>
              
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                  <div className="onchef-card bg-green-600">
                      <div className="onchef-card-subtitle">Total de Vendas no Período</div>
                      <div className="onchef-card-title">{currency(salesData.totalSales)}</div>
                      <div className="text-right text-xs opacity-90">Total de {salesData.totalTickets} Vendas</div>
                  </div>
                  <div className="onchef-card bg-red-600">
                      <div className="onchef-card-subtitle">Custo Total dos Produtos (CMV)</div>
                      <div className="onchef-card-title">{currency(salesData.totalCosts)}</div>
                      <div className="text-right text-xs opacity-90">Perdas: {currency(salesData.totalLosses)}</div>
                  </div>
                  <div className="onchef-card bg-terracota">
                      <div className="onchef-card-subtitle">Lucro Bruto (Vendas - Custo - Perdas)</div>
                      <div className="onchef-card-title">{currency(salesData.totalProfit)}</div>
                      <div className="text-right text-xs opacity-90">Margem: {(salesData.totalSales > 0 ? (salesData.totalProfit / salesData.totalSales) * 100 : 0).toFixed(1)}%</div>
                  </div>
                  <div className="onchef-card bg-blue-600">
                      <div className="onchef-card-subtitle">Ticket Médio (Valor por Venda)</div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">

                      </div>
