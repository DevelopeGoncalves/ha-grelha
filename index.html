  /*********************
   * Registro de Perdas e Quebras (Correção de Produtos sem Custo)
   *********************/
  function PerdasView({ produtos, insumos, salvarPerdas, salvarInsumos, salvarProdutos }){
    const [tipo, setTipo] = useState('insumo');
    const [itemId, setItemId] = useState('');
    const [quantidade, setQuantidade] = useState('');
    const [justificativa, setJustificativa] = useState('');
    
    // Estado com os dados da nuvem em tempo real
    const [historico, setHistorico] = useState([]);
    
    // Estado do Filtro de Mês (Por padrão, abre no mês atual: YYYY-MM)
    const [mesFiltro, setMesFiltro] = useState(new Date().toISOString().slice(0, 7));

    // Busca o histórico de perdas direto do Firebase para ficar em tempo real
    useEffect(() => {
        const unsub = firebase.firestore().collection("perdas").onSnapshot((snapshot) => {
            const lista = [];
            snapshot.forEach(doc => lista.push(doc.data()));
            setHistorico(lista);
        });
        return () => unsub();
    }, []); 

    const listaItens = tipo === 'insumo' ? insumos : produtos;
    const itemSelecionado = listaItens.find(i => i.id === itemId);

    function submit(e){
        e.preventDefault();
        if (!itemId || !quantidade || !justificativa) return alert('Preencha todos os campos.');
        const qtd = Number(quantidade);
        if (qtd <= 0) return alert('Quantidade deve ser positiva.');

        const itemBase = tipo === 'insumo' ? insumos.find(i => i.id === itemId) : produtos.find(p => p.id === itemId);
        if (!itemBase) return alert('Item não encontrado.');
        
        if (itemBase.estoque < qtd) return alert(`Estoque insuficiente: Apenas ${itemBase.estoque.toFixed(2)} disponível.`);

        // --- A MÁGICA DA CORREÇÃO ESTÁ AQUI ---
        let custoUnitario = 0;
        if (tipo === 'insumo') {
            custoUnitario = Number(itemBase.custoUnitario) || 0;
        } else {
            // Se for Produto Final, o sistema perde o "Custo (CMV)". 
            // Se não tiver ficha técnica (custo zero), ele usa o PREÇO DE VENDA para não ficar R$ 0,00!
            custoUnitario = Number(itemBase.custoProduto);
            if (!custoUnitario || custoUnitario === 0) {
                custoUnitario = Number(itemBase.preco) || 0;
            }
        }
        
        const custoTot = qtd * custoUnitario;
        
        const novaPerda = {
            id: uid(),
            data: new Date().toISOString(),
            tipo: tipo,
            itemNome: itemBase.nome,
            itemId: itemId,
            quantidade: qtd,
            custoUnitario: custoUnitario,
            custoTotal: custoTot,
            unidade: tipo === 'insumo' ? itemBase.unidade : 'un',
            justificativa: justificativa,
        };

        if (tipo === 'insumo') {
            salvarInsumos(insumos.map(i => i.id === itemId ? { ...i, estoque: i.estoque - qtd } : i));
        } else {
            const novosProdutos = produtos.map(p => p.id === itemId ? { ...p, estoque: p.estoque - qtd } : p);
            salvarProdutos(novosProdutos);
            
            // Dá baixa nos insumos apenas se a ficha técnica existir
            if (itemBase.fichaTecnica && itemBase.fichaTecnica.length > 0) {
                 const carrinhoPerda = [{ id: itemId, quantidade: qtd, nome: itemBase.nome, preco: 0, custoProduto: itemBase.custoProduto || 0 }];
                 darBaixaInsumos(carrinhoPerda, produtos, insumos, salvarInsumos);
            }
        }

        salvarPerdas([...historico, novaPerda], novaPerda);

        alert(`Perda de ${qtd}x ${itemBase.nome} registrada! Valor contabilizado: ${currency(custoTot)}`);
        setQuantidade('');
        setJustificativa('');
        setItemId('');
    }

    // Filtragem automática por mês
    const perdasFiltradas = useMemo(() => {
        if(!mesFiltro) return historico; 
        return historico.filter(p => p.data && p.data.startsWith(mesFiltro));
    }, [historico, mesFiltro]);

    // SOMA CORRIGIDA
    const totalPerdasMes = perdasFiltradas.reduce((acc, p) => {
        const valor = Number(p.custoTotal) || (Number(p.quantidade) * Number(p.custoUnitario)) || 0;
        return acc + valor;
    }, 0);

    return (
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        {/* COLUNA ESQUERDA: Formulário de Registro */}
        <div className="bg-white p-4 rounded-2xl shadow lg:col-span-1 h-fit">
          <h3 className="font-bold mb-4 text-red-700 flex items-center gap-2">
             <span className="text-2xl">⚠️</span> Registrar Nova Perda
          </h3>
          <form onSubmit={submit} className="space-y-4">
            <label className="block">
                <span className="text-sm font-bold text-gray-600 mb-1 block">O que estragou?</span>
                <select value={tipo} onChange={e=>{setTipo(e.target.value); setItemId('');}} className="w-full p-3 border rounded-xl bg-gray-50 focus:ring-2 focus:ring-red-400" required>
                    <option value="insumo">Insumo (Ex: Limão, Cachaça, Gelo)</option>
                    <option value="produto">Produto Final (Ex: Porção que queimou)</option>
                </select>
            </label>
            
            <label className="block">
                <span className="text-sm font-bold text-gray-600 mb-1 block">Selecione o Item</span>
                <select value={itemId} onChange={e=>setItemId(e.target.value)} className="w-full p-3 border rounded-xl bg-gray-50 focus:ring-2 focus:ring-red-400" required>
                    <option value="">Buscar na lista...</option>
                    {listaItens.map(i => <option key={i.id} value={i.id}>{i.nome}</option>)}
                </select>
            </label>
            
            <label className="block">
                <span className="text-sm font-bold text-gray-600 mb-1 block">Quantidade Perdida</span>
                <input value={quantidade} onChange={e=>setQuantidade(e.target.value)} placeholder={`Ex: 2 (${itemSelecionado?.unidade || 'un'})`} type="number" step="any" className="w-full p-3 border rounded-xl bg-gray-50 focus:ring-2 focus:ring-red-400" required />
            </label>

            <label className="block">
                <span className="text-sm font-bold text-gray-600 mb-1 block">Motivo (Justificativa)</span>
                <input value={justificativa} onChange={e=>setJustificativa(e.target.value)} placeholder="Ex: Garrafa caiu no chão" className="w-full p-3 border rounded-xl bg-gray-50 focus:ring-2 focus:ring-red-400" required />
            </label>

            <button className="w-full py-4 mt-2 bg-red-600 text-white rounded-xl font-bold shadow-lg hover:bg-red-700 transition flex justify-center items-center gap-2">
                <span>Registrar Prejuízo</span>
            </button>
          </form>
        </div>

        {/* COLUNA DIREITA: Relatório e Histórico */}
        <div className="lg:col-span-2 bg-white p-5 rounded-2xl shadow flex flex-col h-full">
          
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3 border-b pb-4">
             <h3 className="font-bold text-xl text-gray-800">📋 Relatório de Perdas</h3>
             
             <div className="flex items-center gap-2 bg-gray-50 p-2 rounded-lg border">
                 <label className="text-sm font-bold text-gray-500">Mês:</label>
                 <input 
                     type="month" 
                     value={mesFiltro} 
                     onChange={e => setMesFiltro(e.target.value)} 
                     className="p-1 text-sm border-none bg-transparent focus:outline-none focus:ring-0 font-semibold cursor-pointer text-gray-800"
                 />
                 <button type="button" onClick={() => setMesFiltro('')} className="text-xs text-gray-400 hover:text-gray-800 underline ml-2">Ver Tudo</button>
             </div>
          </div>
          
          <div className="bg-red-50 border-2 border-red-200 p-5 rounded-xl mb-6 flex justify-between items-center shadow-sm">
              <div>
                  <span className="font-black text-red-800 uppercase text-sm tracking-wider">Custo Total Perdido</span>
                  <div className="text-xs text-red-600 mt-1">{perdasFiltradas.length} itens registrados no filtro atual</div>
              </div>
              <span className="text-4xl font-extrabold text-red-600">{currency(totalPerdasMes)}</span>
          </div>

          <div className="overflow-x-auto max-h-[500px] overflow-y-auto border rounded-xl shadow-sm">
            <table className="w-full text-sm">
              <thead className="bg-gray-100 text-gray-600 sticky top-0 shadow-sm">
                <tr>
                  <th className="p-3 text-left">Data</th>
                  <th className="p-3 text-left">Item Perdido</th>
                  <th className="p-3 text-right">Custo (R$)</th>
                  <th className="p-3 text-left">Motivo</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {perdasFiltradas.sort((a,b) => new Date(b.data) - new Date(a.data)).map(p=>{
                  const custoReal = Number(p.custoTotal) || (Number(p.quantidade) * Number(p.custoUnitario)) || 0;
                  
                  return (
                    <tr key={p.id} className="hover:bg-red-50 transition">
                      <td className="p-3 text-xs whitespace-nowrap">
                          <span className="font-bold text-gray-700">{new Date(p.data).toLocaleDateString('pt-BR')}</span><br/>
                          <span className="text-gray-400">{new Date(p.data).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</span>
                      </td>
                      <td className="p-3">
                          <span className="font-semibold text-gray-800">{p.quantidade} {p.unidade} - {p.itemNome}</span> 
                          <span className="text-[10px] bg-gray-200 text-gray-600 px-1 py-0.5 rounded ml-2 uppercase font-bold">{p.tipo}</span>
                      </td>
                      <td className="p-3 text-right text-red-600 font-bold">{currency(custoReal)}</td>
                      <td className="p-3 text-xs italic text-gray-600">{p.justificativa}</td>
                  </tr>
                  )
                })}
                {perdasFiltradas.length === 0 && (
                    <tr><td colSpan="4" className="p-10 text-center text-gray-500 border-dashed border-2 m-2 rounded-lg">Nenhuma quebra ou perda registrada neste período. Ótimo trabalho! 🎉</td></tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  }

  function RelatoriosView({ vendas, perdas }) {
    const areaRef = useRef(null);
    const lucroRef = useRef(null); 
    
    const series = useMemo(() => {
      const map = {};
      vendas.forEach(v => {
        const day = v.data.split('T')[0];
        map[day] = {
            receita: (map[day]?.receita || 0) + v.total,
            custo: (map[day]?.custo || 0) + (v.custoVenda || 0)
        };
      });
      const arr = Object.entries(map).map(([d, t]) => ({ 
          date: d, 
          receita: t.receita, 
          custo: t.custo, 
          lucro: t.receita - t.custo
      }));
      arr.sort((a, b) => a.date.localeCompare(b.date));
      return arr;
    }, [vendas]);
    
    const perdasSeries = useMemo(() => {
        const map = {};
        perdas.forEach(p => {
            const day = p.data.split('T')[0];
            map[day] = (map[day] || 0) + p.custoTotal;
        });
        const arr = Object.entries(map).map(([d, c]) => ({ date: d, custo: c }));
        arr.sort((a, b) => a.date.localeCompare(b.date));
        return arr;
    }, [perdas]);

    const top = useMemo(() => {
      const vendaMap = {};
      let totalUnidadesVendidas = 0; 

      vendas.forEach(v => {
        v.itens.forEach(it => {
          vendaMap[it.id] = vendaMap[it.id] || { nome: it.nome, quantidade: 0, total: 0, custo: 0 };
          vendaMap[it.id].quantidade += it.quantidade;
          vendaMap[it.id].total += it.preco * it.quantidade;
          vendaMap[it.id].custo += (it.custoUnitario || 0) * it.quantidade; 
          totalUnidadesVendidas += it.quantidade; 
        });
      });

      const topProdutosComDistribuicao = Object.values(vendaMap)
        .sort((a, b) => b.quantidade - a.quantidade)
        .slice(0, 6)
        .map(p => ({
          ...p,
          lucro: p.total - p.custo,
          distribuicao: totalUnidadesVendidas > 0 ? (p.quantidade / totalUnidadesVendidas) * 100 : 0
        }));
        
      return {
        list: topProdutosComDistribuicao,
        totalUnidades: totalUnidadesVendidas
      };
    }, [vendas]);

    useEffect(() => {
      if (areaRef.current && areaRef.current._chart) { try { areaRef.current._chart.destroy(); } catch { } }
      if (lucroRef.current && lucroRef.current._chart) { try { lucroRef.current._chart.destroy(); } catch { } }
      
      if (areaRef.current && series.length > 0) {
        const ctx = areaRef.current.getContext('2d');
        const labels = series.map(s => s.date.substring(5));
        const dataReceita = series.map(s => s.receita);
        areaRef.current._chart = new Chart(ctx, {
          type: 'line',
          data: { labels, datasets: [{ 
            label: 'Receita (R$)', data: dataReceita, fill: true, tension: 0.3, 
            borderColor: '#e4593c', 
            backgroundColor: 'rgba(228,89,60,0.12)'
          }] },
          options: { responsive: true, maintainAspectRatio: false }
        });
      }
      
      if (lucroRef.current && series.length > 0) {
        const ctx = lucroRef.current.getContext('2d');
        const labels = series.map(s => s.date.substring(5));
        const dataLucro = series.map(s => s.lucro);
        const dataPerdas = perdasSeries.map(s => s.custo);
        lucroRef.current._chart = new Chart(ctx, {
          type: 'bar',
          data: { labels, datasets: [
            { label: 'Lucro', data: dataLucro, backgroundColor: '#059669' },
            { label: 'Perdas (Custo)', data: dataPerdas, backgroundColor: '#dc2626' }
          ] },
          options: { responsive: true, maintainAspectRatio: false }
        });
      }
    }, [series, perdasSeries]);

    return (
      <div className="space-y-4">
        <h2 className="text-3xl font-extrabold text-gray-800 border-b pb-2">📊 Relatórios</h2>
        
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div className="bg-white p-4 rounded-2xl shadow">
            <h4 className="font-bold mb-2">Receita por dia</h4>
            <div style={{ height: 240 }}>
              {series.length > 0 ? <canvas ref={areaRef}></canvas> : <div className="text-gray-500 text-center py-10">Sem dados</div>}
            </div>
          </div>
          
          <div className="bg-white p-4 rounded-2xl shadow">
            <h4 className="font-bold mb-2">Lucro e Perdas por dia</h4>
            <div style={{ height: 240 }}>
              {series.length > 0 || perdasSeries.length > 0 ? <canvas ref={lucroRef}></canvas> : <div className="text-gray-500 text-center py-10">Sem dados</div>}
            </div>
          </div>
          
        </div>
        
        <div className="bg-white p-4 rounded-2xl shadow">
            <h4 className="font-bold mb-3">Top 6 Produtos por Quantidade</h4>
            {top.list.length > 0 ? (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {top.list.map((p, i) => (
                  <div key={p.nome} className="text-sm bg-gray-50 p-3 rounded-lg border">
                    <div className="flex justify-between items-center mb-1">
                      <span className="font-bold text-lg">{i + 1}. {p.nome}</span>
                      <span className="font-semibold text-terracota">{p.distribuicao.toFixed(1)}%</span>
                    </div>
                    <div className="text-xs text-gray-600 mb-2">
                        Vendas: {currency(p.total)} | Custo: {currency(p.custo)} | Lucro: <b className="text-green-700">{currency(p.lucro)}</b>
                    </div>
                    <div className="mt-1 w-full bg-gray-200 rounded-full h-2">
                      <div className="h-2 rounded-full bg-gradient-to-r from-terracota to-redBrown" style={{ width: `${p.distribuicao}%` }}></div>
                    </div>
                  </div>
                ))}
              </div>
            ) : (
              <div className="text-gray-500 text-center py-6">Sem dados</div>
            )}
          </div>
      </div>
    );
  }

  function RelatorioAvancado({ vendas, user }) { 
    const [from, setFrom] = useState('');
    const [to, setTo] = useState('');
    const [operadorFiltro, setOperadorFiltro] = useState('Todos'); 
    const [dadosCarregados, setDadosCarregados] = useState(false);
    const [vendasFiltradas, setVendasFiltradas] = useState([]);
    
    const [listaCadastrados, setListaCadastrados] = useState([]); 
    
    // Estados do Backup e Reset
    const [loadingBackup, setLoadingBackup] = useState(false);
    const [loadingRestore, setLoadingRestore] = useState(false);
    const [loadingReset, setLoadingReset] = useState(false);

    useEffect(() => {
        async function fetchUsuarios() {
            try {
                const doc = await db.collection("dados_restaurante").doc("usuarios").get();
                if (doc.exists && doc.data().dados) {
                    const users = JSON.parse(doc.data().dados);
                    // Pega o 'nome' ou o 'username' antigo, e filtra para não deixar passar nenhum vazio
                    const nomesValidos = users.map(u => u.nome || u.username).filter(n => n && String(n).trim() !== '');
                    setListaCadastrados(nomesValidos);
                }
            } catch (e) {
                console.error("Erro ao buscar usuários para o filtro", e);
            }
        }
        fetchUsuarios();
    }, []);

    const listaOperadores = useMemo(() => {
        // Varre as vendas e se o operador estiver vazio, vira 'Desconhecido'
        const ops = vendas.map(v => v.operador && String(v.operador).trim() !== '' ? v.operador : 'Desconhecido');
        
        // Junta os cadastrados com os do histórico, e aplica a "Lista Negra"
        const todosOsNomes = [...listaCadastrados, ...ops].filter(nome => {
            if (!nome) return false;
            const nomeStr = String(nome).trim();
            if (nomeStr === '') return false;
            
            // 👻 LISTA NEGRA: Esconde o desenvolvedor e o usuário teste antigo do filtro
            const nomeMinusculo = nomeStr.toLowerCase();
            if (nomeMinusculo.includes('alexgoncalves_21')) return false; // Esconde você
            if (nomeMinusculo === 'admin') return false; // Esconde o admin velho
            
            return true;
        });
        
        return ['Todos', ...new Set(todosOsNomes)];
    }, [vendas, listaCadastrados]);

    const handleFiltrar = () => {
        if (!from || !to) {
            alert("Por favor, selecione a Data Inicial e a Data Final.");
            return;
        }

        const filtered = vendas.filter(v => {
            // Fuso horário corrigido
            const dataObjeto = new Date(v.data);
            const ano = dataObjeto.getFullYear();
            const mes = String(dataObjeto.getMonth() + 1).padStart(2, '0');
            const dia = String(dataObjeto.getDate()).padStart(2, '0');
            const vDateLocal = `${ano}-${mes}-${dia}`; 

            const matchData = vDateLocal >= from && vDateLocal <= to;
            const matchOperador = operadorFiltro === 'Todos' || (v.operador || 'Desconhecido') === operadorFiltro;
            
            return matchData && matchOperador;
        });

        // Mais recente primeiro
        filtered.sort((a,b) => new Date(b.data) - new Date(a.data));

        setVendasFiltradas(filtered);
        setDadosCarregados(true);
    };

    const stats = useMemo(() => {
      const totalVendas = vendasFiltradas.length;
      const receitaTotal = vendasFiltradas.reduce((acc, v) => acc + v.total, 0);
      const custoTotal = vendasFiltradas.reduce((acc, v) => acc + (v.custoVenda || 0), 0);
      const lucroTotal = receitaTotal - custoTotal;
      const ticketMedio = totalVendas > 0 ? receitaTotal / totalVendas : 0;
      const margemLucro = receitaTotal > 0 ? (lucroTotal / receitaTotal) * 100 : 0;

      return { totalVendas, receitaTotal, custoTotal, lucroTotal, ticketMedio, margemLucro };
    }, [vendasFiltradas]);

    const exportarParaExcel = () => {
        if (vendasFiltradas.length === 0) return alert('Não há dados para exportar neste período.');

        let csvContent = "\uFEFFData;Hora;Operador;Origem;Método Pagamento;Receita;Custo;Lucro\n";

        vendasFiltradas.forEach(v => {
            const dataObj = new Date(v.data);
            const dataStr = dataObj.toLocaleDateString('pt-BR');
            const horaStr = dataObj.toLocaleTimeString('pt-BR');
            const operador = v.operador || 'Desconhecido';
            const receita = v.total.toFixed(2).replace('.', ',');
            const custo = (v.custoVenda || 0).toFixed(2).replace('.', ',');
            const lucro = (v.total - (v.custoVenda || 0)).toFixed(2).replace('.', ',');
            const metodo = v.metodoPagamento || 'Não Informado';
            const origem = v.origem || 'Não Informado';

            csvContent += `${dataStr};${horaStr};${operador};${origem};${metodo};${receita};${custo};${lucro}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `Relatorio_${operadorFiltro}_${from}_a_${to}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    // ==========================================
    // MÓDULO DE BACKUP E RESTAURAÇÃO (NUVEM)
    // ==========================================
    const gerarBackup = async () => {
        if(!confirm("Gerar arquivo de Backup completo do sistema? Isso pode levar alguns segundos.")) return;
        setLoadingBackup(true);
        try {
            const backupData = {
                dataGeracao: new Date().toISOString(),
                configuracoes: {},
                vendas: [],
                perdas: []
            };
            const docsConfig = ["produtos", "insumos", "usuarios", "transacoes_caixa"];
            for (let docName of docsConfig) {
                const snap = await db.collection("dados_restaurante").doc(docName).get();
                if (snap.exists) backupData.configuracoes[docName] = snap.data().dados;
            }
            const vendasSnap = await db.collection("vendas").get();
            vendasSnap.forEach(doc => backupData.vendas.push(doc.data()));

            const perdasSnap = await db.collection("perdas").get();
            perdasSnap.forEach(doc => backupData.perdas.push(doc.data()));

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `Backup_ThiagoPDV_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();

            alert("✅ Backup gerado e salvo no seu computador com sucesso!");
        } catch (error) {
            console.error("Erro ao gerar backup:", error);
            alert("Erro ao gerar backup: " + error.message);
        } finally {
            setLoadingBackup(false);
        }
    };

    const restaurarBackup = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if(!confirm("⚠️ ATENÇÃO EXTREMA ⚠️\n\nIsso irá APAGAR os dados atuais e substituir pelo backup selecionado. Tem certeza absoluta que deseja continuar?")) {
            e.target.value = null; 
            return;
        }

        setLoadingRestore(true);
        const reader = new FileReader();
        
        reader.onload = async (event) => {
            try {
                const backupData = JSON.parse(event.target.result);
                if (!backupData.configuracoes) throw new Error("Arquivo JSON inválido ou corrompido.");

                for (const [key, value] of Object.entries(backupData.configuracoes)) {
                    await db.collection("dados_restaurante").doc(key).set({
                        dados: value,
                        ultimaAtualizacao: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }

                if (backupData.vendas && backupData.vendas.length > 0) {
                    for (const venda of backupData.vendas) {
                        await db.collection("vendas").doc(venda.id.toString()).set(venda);
                    }
                }

                if (backupData.perdas && backupData.perdas.length > 0) {
                    for (const perda of backupData.perdas) {
                        await db.collection("perdas").doc(perda.id.toString()).set(perda);
                    }
                }

                alert("🔄 Restauração concluída com sucesso! O sistema será recarregado.");
                window.location.reload(); 
            } catch (error) {
                console.error("Erro na restauração:", error);
                alert("Erro ao restaurar: " + error.message);
            } finally {
                setLoadingRestore(false);
                e.target.value = null;
            }
        };

        reader.readAsText(file);
    };

    const resetarDadosVendas = async () => {
        const confirm1 = confirm("⚠️ ATENÇÃO MÁXIMA ⚠️\n\nIsso apagará TODAS as Vendas, Pedidos, Perdas e o Fluxo de Caixa permanentemente.\nOs Produtos, Insumos e Usuários SERÃO MANTIDOS INTACTOS.\n\nDeseja continuar?");
        if(!confirm1) return;
        
        const confirm2 = prompt("Para confirmar a exclusão do histórico, digite exatamente: APAGAR");
        if(confirm2 !== "APAGAR") {
            alert("Operação cancelada.");
            return;
        }

        setLoadingReset(true);
        try {
            const deleteCollection = async (collectionPath) => {
                const snapshot = await db.collection(collectionPath).get();
                const batch = db.batch();
                snapshot.docs.forEach((doc) => {
                    batch.delete(doc.ref);
                });
                await batch.commit();
            };

            await deleteCollection("vendas");
            await deleteCollection("pedidos");
            await deleteCollection("perdas");

            await db.collection("dados_restaurante").doc("caixa_atual").set({ dados: null });
            await db.collection("dados_restaurante").doc("transacoes_caixa").set({ 
                dados: JSON.stringify([]),
                ultimaAtualizacao: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("✅ Histórico de vendas, pedidos e caixa limpo com sucesso! O sistema está zerado para uso.");
            window.location.reload(); 
        } catch (error) {
            console.error("Erro ao limpar dados:", error);
            alert("Erro ao limpar dados: " + error.message);
        } finally {
            setLoadingReset(false);
        }
    };

    return (
      <div className="space-y-6">
        <div className="flex justify-between items-center border-b pb-2">
            <h2 className="text-3xl font-extrabold text-gray-800">📈 Relatório Avançado</h2>
            {dadosCarregados && (
                <button 
                    onClick={exportarParaExcel}
                    className="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-xl shadow transition flex items-center gap-2"
                >
                    📊 Exportar Planilha
                </button>
            )}
        </div>

        <div className="bg-white border p-4 rounded-2xl shadow">
          <h3 className="font-bold mb-3 text-terracota">Filtros de Busca</h3>
          <div className="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <label className="block">
              <span className="text-sm text-gray-500 font-semibold">Data Inicial</span>
              <input type="date" value={from} onChange={e => setFrom(e.target.value)} className="mt-1 block w-full p-3 border border-gray-300 rounded-xl" />
            </label>
            <label className="block">
              <span className="text-sm text-gray-500 font-semibold">Data Final</span>
              <input type="date" value={to} onChange={e => setTo(e.target.value)} className="mt-1 block w-full p-3 border border-gray-300 rounded-xl" />
            </label>
            
            <label className="block">
              <span className="text-sm text-gray-500 font-semibold">Vendedor (Operador)</span>
              <select value={operadorFiltro} onChange={e => setOperadorFiltro(e.target.value)} className="mt-1 block w-full p-3 border border-gray-300 rounded-xl">
                  {listaOperadores.map(op => (
                      <option key={op} value={op}>{op === 'Todos' ? 'Todos os Vendedores' : op}</option>
                  ))}
              </select>
            </label>

            <button 
                onClick={handleFiltrar}
                className="w-full py-3 bg-gray-800 hover:bg-black text-white rounded-xl font-bold shadow transition"
            >
                🔍 Filtrar Dados
            </button>
          </div>
        </div>

        {!dadosCarregados ? (
            <div className="bg-white p-10 rounded-2xl shadow text-center border border-dashed border-gray-300">
                <div className="text-4xl mb-3">📅</div>
                <h3 className="text-xl font-bold text-gray-600">Nenhum período selecionado</h3>
                <p className="text-gray-400 mt-2">Escolha as datas, o vendedor e clique em "Filtrar Dados" para gerar o relatório.</p>
            </div>
        ) : (
          <div className="bg-white border p-4 rounded-2xl shadow animate-slideIn">
            <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
              <div className="bg-gray-50 p-3 rounded-xl text-center border">
                <div className="text-xs text-gray-500 font-bold uppercase">Total Vendas</div>
                <div className="font-bold text-xl">{stats.totalVendas}</div>
              </div>
              <div className="bg-gray-50 p-3 rounded-xl text-center border border-orange-100">
                <div className="text-xs text-orange-600 font-bold uppercase">Receita Total</div>
                <div className="font-bold text-xl text-terracota">{currency(stats.receitaTotal)}</div>
              </div>
              <div className="bg-red-50 p-3 rounded-xl text-center border border-red-100">
                <div className="text-xs text-red-500 font-bold uppercase">Custo Total (CMV)</div>
                <div className="font-bold text-xl text-red-600">{currency(stats.custoTotal)}</div>
              </div>
              <div className="bg-green-50 p-3 rounded-xl text-center border border-green-100">
                <div className="text-xs text-green-600 font-bold uppercase">Lucro Bruto</div>
                <div className="font-bold text-xl text-green-700">{currency(stats.lucroTotal)}</div>
              </div>
              <div className="bg-blue-50 p-3 rounded-xl text-center border border-blue-100 col-span-2 md:col-span-1">
                <div className="text-xs text-blue-600 font-bold uppercase">Ticket Médio (Lucro)</div>
                <div className="font-bold text-xl text-blue-700">{currency(stats.ticketMedio)} <span className="text-xs opacity-70">({stats.margemLucro.toFixed(1)}%)</span></div>
              </div>
            </div>
            
            {/* TABELA: HISTÓRICO DETALHADO EXATO AO EXCEL */}
            <h4 className="font-bold mt-8 mb-3 border-t pt-4 text-gray-700">📋 Histórico Detalhado de Vendas</h4>
            <div className="overflow-x-auto max-h-[500px] overflow-y-auto border rounded-xl shadow-sm">
              <table className="w-full text-sm">
                <thead className="bg-gray-100 text-gray-600 sticky top-0 shadow-sm">
                  <tr>
                    <th className="p-3 text-left">Data</th>
                    <th className="p-3 text-left">Hora</th>
                    <th className="p-3 text-left">Operador</th>
                    <th className="p-3 text-left">Origem</th>
                    <th className="p-3 text-center">Pagamento</th>
                    <th className="p-3 text-right">Receita</th>
                    <th className="p-3 text-right">Custo</th>
                    <th className="p-3 text-right">Lucro</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100">
                  {vendasFiltradas.map(v => {
                     const dataObj = new Date(v.data);
                     const custo = v.custoVenda || 0;
                     const lucro = v.total - custo;
                     return (
                       <tr key={v.id} className="hover:bg-gray-50 transition">
                         <td className="p-3 font-medium whitespace-nowrap">{dataObj.toLocaleDateString('pt-BR')}</td>
                         <td className="p-3 text-gray-500 whitespace-nowrap">{dataObj.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</td>
                         <td className="p-3 text-gray-700">{v.operador || 'Desconhecido'}</td>
                         <td className="p-3 text-gray-700">{v.origem || 'Não Informado'}</td>
                         <td className="p-3 text-center"><span className="bg-gray-200 px-2 py-1 rounded text-xs font-bold">{v.metodoPagamento || 'N/A'}</span></td>
                         <td className="p-3 text-right font-bold text-gray-800">{currency(v.total)}</td>
                         <td className="p-3 text-right text-red-500">{currency(custo)}</td>
                         <td className="p-3 text-right text-green-600 font-bold">{currency(lucro)}</td>
                       </tr>
                     )
                  })}
                  {vendasFiltradas.length === 0 && (
                     <tr><td colSpan="8" className="p-6 text-center text-gray-500">Nenhuma venda encontrada no período.</td></tr>
                  )}
                </tbody>
              </table>
            </div>

          </div>
        )}

        {/* ================= ÁREA DE BACKUP E RESTAURAÇÃO (SÓ PARA O ALEX) ================= */}
        {user && user.email === 'alexgoncalves_21@hotmail.com' && (
            <div className="bg-gray-900 border-2 border-red-500 p-6 rounded-2xl shadow-lg mt-10 text-white">
                <h3 className="text-2xl font-extrabold text-red-500 mb-2 flex items-center gap-2">👨‍💻 Painel Master do Desenvolvedor</h3>
                <p className="text-sm text-gray-400 mb-6">Área exclusiva. O Backup salva 100% do sistema. O Reset limpa apenas o histórico de vendas e caixa, mantendo o cardápio e os usuários intactos para o cliente.</p>
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow flex flex-col items-center justify-center text-center">
                        <div className="text-4xl mb-3">💾</div>
                        <h4 className="font-bold text-lg mb-1">Backup Completo</h4>
                        <p className="text-xs text-gray-400 mb-4">Salva Tudo (Produtos, Vendas, Usuários, etc).</p>
                        <button 
                            onClick={gerarBackup}
                            disabled={loadingBackup}
                            className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition disabled:opacity-50"
                        >
                            {loadingBackup ? 'Empacotando...' : 'Baixar JSON'}
                        </button>
                    </div>

                    <div className="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow flex flex-col items-center justify-center text-center">
                        <div className="text-4xl mb-3">🔄</div>
                        <h4 className="font-bold text-lg mb-1">Restaurar Sistema</h4>
                        <p className="text-xs text-orange-400 mb-4">Sobrescreve o banco de dados com o backup.</p>
                        
                        <label className={`w-full py-3 font-bold rounded-xl transition cursor-pointer text-center ${loadingRestore ? 'bg-gray-600' : 'bg-orange-600 hover:bg-orange-700'} text-white`}>
                            {loadingRestore ? 'Restaurando...' : 'Restaurar Arquivo'}
                            <input 
                                type="file" 
                                accept=".json" 
                                className="hidden" 
                                onChange={restaurarBackup} 
                                disabled={loadingRestore}
                            />
                        </label>
                    </div>

                    <div className="bg-red-900/30 p-5 rounded-xl border border-red-800 shadow flex flex-col items-center justify-center text-center">
                        <div className="text-4xl mb-3">🗑️</div>
                        <h4 className="font-bold text-lg mb-1 text-red-400">Zerar Histórico</h4>
                        <p className="text-xs text-red-300 mb-4">Apaga Vendas, Caixa e Pedidos. Mantém Produtos.</p>
                        <button 
                            onClick={resetarDadosVendas}
                            disabled={loadingReset}
                            className="w-full py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl transition disabled:opacity-50"
                        >
                            {loadingReset ? 'Limpando...' : 'Resetar Vendas'}
                        </button>
                    </div>
                </div>
            </div>
        )}

      </div>
    );
  }

  function App(){
    const [user, setUser] = useState(null);
    const [isLoggedIn, setIsLoggedIn] = useState(false); 
    const [loading, setLoading] = useState(true);
    const [mobileOpen, setMobileOpen] = useState(false); 
    
    // NUVEM STATE
    const [caixaAtual, setCaixaAtual] = useState(null);
    const [produtos, setProdutos] = useState([]); 
    const [insumos, setInsumos] = useState([]); 
    const [perdas, setPerdas] = useState([]); 
    const [vendas, setVendas] = useState([]);
    const [pedidos, setPedidos] = useState([]);
    const [pedidosPendentesWeb, setPedidosPendentesWeb] = useState([]);
    
    const [carrinho, setCarrinho] = useState([]);
    const [busca, setBusca] = useState('');
    const [selected, setSelected] = useState('caixa_turno'); 
    const [mesaAtiva, setMesaAtiva] = useState(null);
    const [nomesMesas, setNomesMesas] = useState({});
    
    // --- AUTENTICAÇÃO E CARREGAMENTO NUVEM ---
    useEffect(() => {
        // Ouve mudanças no Login do Firebase
        const unsubscribeAuth = firebase.auth().onAuthStateChanged(async (authUser) => {
            if (authUser) {
                try {
                    const docUsuarios = await db.collection("dados_restaurante").doc("usuarios").get();
                    
                    let role = 'bloqueado'; 
                    let nome = authUser.email ? authUser.email.split('@')[0] : 'Admin';
                    const emailLogado = authUser.email ? authUser.email.toLowerCase() : '';

                    if (docUsuarios.exists && docUsuarios.data().dados) {
                        const lista = JSON.parse(docUsuarios.data().dados);
                        
                        // BUSCA ULTRA SEGURA: Evita o erro do 'toLowerCase' com usuários velhos
                        const userData = lista.find(u => {
                            if (!u || !u.email) return false; // Se o usuário não tiver email, o código simplesmente o ignora
                            return String(u.email).toLowerCase() === emailLogado;
                        });

                        if (userData) {
                            role = userData.role;
                            nome = userData.nome || nome;
                        } 
                    }

                    // CHAVE MESTRA: Garante que o SEU e-mail nunca fique trancado de fora
                    if (emailLogado === 'alexgoncalves_21@hotmail.com') {
                        role = 'admin';
                    }

                    // Se não for o seu e-mail e não estiver na lista, expulsa
                    if (role === 'bloqueado') {
                        alert("Acesso Negado: Seu usuário foi removido ou não tem permissão.");
                        firebase.auth().signOut();
                        setLoading(false);
                        return;
                    }

                    setUser({ email: authUser.email, username: nome, role: role });
                    setIsLoggedIn(true);

                    // Carrega os dados do restaurante
                    const docInsumos = await db.collection("dados_restaurante").doc("insumos").get();
                    if (docInsumos.exists && docInsumos.data().dados) setInsumos(JSON.parse(docInsumos.data().dados));

                    const docProdutos = await db.collection("dados_restaurante").doc("produtos").get();
                    if (docProdutos.exists && docProdutos.data().dados) setProdutos(JSON.parse(docProdutos.data().dados));
                    
                    const docCaixa = await db.collection("dados_restaurante").doc("caixa_atual").get();
                    if (docCaixa.exists && docCaixa.data().dados) setCaixaAtual(JSON.parse(docCaixa.data().dados));

                    const docNomes = await db.collection("dados_restaurante").doc("nomes_mesas").get();
                    if (docNomes.exists && docNomes.data().dados) setNomesMesas(JSON.parse(docNomes.data().dados));

                } catch(e) { 
                    console.error("Erro crítico ao ler banco:", e);
                    alert("Erro no Login:\n" + e.message);
                    firebase.auth().signOut(); 
                } finally {
                    setLoading(false); 
                }

            } else {
                setUser(null);
                setIsLoggedIn(false);
                setLoading(false);
            }
        });

        return () => unsubscribeAuth();
    }, []);

    // Escuta Pedidos, Vendas e Perdas APENAS se estiver logado
    useEffect(() => {
        if (!isLoggedIn) return;

        const unsubPedidos = db.collection("pedidos").onSnapshot((snapshot) => {
            const lista = []; snapshot.forEach(doc => lista.push(doc.data())); setPedidos(lista);
        });
        const unsubVendas = db.collection("vendas").onSnapshot((snapshot) => {
            const lista = []; snapshot.forEach(doc => lista.push(doc.data())); setVendas(lista);
        });
        const unsubPerdas = db.collection("perdas").onSnapshot((snapshot) => {
            const lista = []; snapshot.forEach(doc => lista.push(doc.data())); setPerdas(lista);
        });

        return () => { unsubPedidos(); unsubVendas(); unsubPerdas(); };
    }, [isLoggedIn]);
    
    const salvarProdutos = (novos) => { setProdutos(novos); storageSet('produtos', novos); };
    const salvarInsumos = (novos) => { setInsumos(novos); storageSet('insumos', novos); };
    const salvarPedidos = (novos) => { setPedidos(novos); }; // Vazio porque a nuvem atualiza sozinha
    
    const salvarVendas = (novaLista, novaVendaUnica = null) => { 
        if (novaVendaUnica) db.collection("vendas").doc(novaVendaUnica.id.toString()).set(novaVendaUnica);
    };
    
    const salvarPerdas = (novaLista, novaPerdaUnica = null) => { 
        if (novaPerdaUnica) db.collection("perdas").doc(novaPerdaUnica.id.toString()).set(novaPerdaUnica);
    };

    const atualizarNomeMesa = (mesaOriginal, novoNome) => {
        const novosNomes = { ...nomesMesas };
        if (novoNome && novoNome.trim() !== '') novosNomes[mesaOriginal] = novoNome;
        else delete novosNomes[mesaOriginal]; // Se enviar null/vazio, ele apaga o nome
        setNomesMesas(novosNomes);
        db.collection("dados_restaurante").doc("nomes_mesas").set({ dados: JSON.stringify(novosNomes) });
    };

    function adicionarAoCarrinho(produto){ 
      const itemExistente = carrinho.find(i=>i.id===produto.id);
      const produtoEmEstoque = produtos.find(p=>p.id===produto.id);
      if (produtoEmEstoque.manutencao) return alert('Manutenção.');
      if (produtoEmEstoque.estoque <= (itemExistente?.quantidade || 0)) return alert('Estoque insuficiente');
      if(itemExistente) setCarrinho(carrinho.map(i => i.id===produto.id ? {...i, quantidade: i.quantidade+1} : i));
      else setCarrinho([...carrinho, {...produto, quantidade:1}]);
    }
    function alterarQuantidade(id, novaQuantidade){ 
      const produtoEmEstoque = produtos.find(p=>p.id===id);
      if(novaQuantidade <= 0) removerDoCarrinho(id);
      else if (novaQuantidade > produtoEmEstoque.estoque) alert(`Máximo: ${produtoEmEstoque.estoque.toFixed(0)}`);
      else setCarrinho(carrinho.map(i=> i.id===id ? {...i, quantidade:novaQuantidade} : i));
    }
    function removerDoCarrinho(id){ setCarrinho(carrinho.filter(i=>i.id!==id)); }

    // Adicionado o parâmetro 'tipoImpressao'
    function finalizarVenda(metodoPagamento = 'Dinheiro', tipoImpressao = 'normal'){
      if(carrinho.length === 0) return alert('Carrinho vazio!');
      
      const total = carrinho.reduce((s,i)=> s + i.preco * i.quantidade, 0);
      for (const item of carrinho) {
          const pEstoque = produtos.find(p => p.id === item.id);
          if (pEstoque.estoque < item.quantidade) return alert(`Estoque insuficiente: ${item.nome}`);
      }
      
      const novosProdutos = produtos.map(produto => {
        const itemVendido = carrinho.find(item => item.id === produto.id);
        if(itemVendido) return {...produto, estoque: produto.estoque - itemVendido.quantidade};
        return produto;
      });
      salvarProdutos(novosProdutos);
      
      const custoVenda = darBaixaInsumos(carrinho, produtos, insumos, setInsumos);
      const itensVenda = carrinho.map(i => ({ id: i.id, nome: i.nome, preco: i.preco, quantidade: i.quantidade, custoUnitario: i.custoProduto || 0 }));

      const novaVenda = {
        id: uid(), data: new Date().toISOString(), itens: itensVenda, total: total, custoVenda: custoVenda,
        origem: 'Balcão', metodoPagamento: metodoPagamento, turnoId: caixaAtual?.id || null, operador: user?.username || 'Sistema'
      };
      
      salvarVendas([...vendas, novaVenda], novaVenda);
      
      setCarrinho([]); 
      
      // MÁGICA: DECIDE QUAL PAPEL IMPRIMIR
      if (tipoImpressao === 'ficha') {
          if(typeof imprimirFichas === 'function') {
              imprimirFichas(itensVenda);
          } else {
              alert("Aviso: Função de fichas não encontrada.");
          }
      } else {
          if(typeof imprimirCupomFechamento === 'function') {
              imprimirCupomFechamento('Venda Balcão', itensVenda, total, metodoPagamento);
          } else {
              alert("Venda registrada, mas a função de impressão direta não foi encontrada.");
          }
      }
    }
    
    function enviarPedidoMesa() {
        if(carrinho.length === 0) return alert('Carrinho vazio!');
        const total = carrinho.reduce((s,i)=> s + i.preco * i.quantidade, 0);
        for (const item of carrinho) {
          const pEstoque = produtos.find(p => p.id === item.id);
          if (pEstoque.estoque < item.quantidade) return alert(`Estoque insuficiente: ${item.nome}`);
        }
        const novosProdutos = produtos.map(produto => {
            const itemVendido = carrinho.find(item => item.id === produto.id);
            if(itemVendido) return {...produto, estoque: produto.estoque - itemVendido.quantidade};
            return produto;
        });
        salvarProdutos(novosProdutos);
        const custoVenda = darBaixaInsumos(carrinho, produtos, insumos, setInsumos);
        const itensVenda = carrinho.map(i => ({ id: i.id, nome: i.nome, preco: i.preco, quantidade: i.quantidade, custoUnitario: i.custoProduto || 0 }));

        const novoPedido = {
            id: uid(), data: new Date().toISOString(), inicioPreparo: new Date().toISOString(), nomeCliente: mesaAtiva, 
            itens: itensVenda, total: total, status: 'Pendente', tipo: 'Mesa', custoVenda: custoVenda 
        };
        db.collection("pedidos").doc(novoPedido.id.toString()).set(novoPedido).then(() => {
            setCarrinho([]); alert(`Pedido enviado para a cozinha (${mesaAtiva})!`); setSelected('detalhe_mesa');
        });
    }

    function removerItemMesa(pedidoId, indexItem) {
        if(!confirm('Deseja realmente excluir este item da conta da mesa?')) return;
        const pedido = pedidos.find(p => p.id === pedidoId);
        if(!pedido) return;
        
        const novosItens = [...pedido.itens];
        novosItens.splice(indexItem, 1); // Remove o item da lista
        
        if (novosItens.length === 0) {
             // Se não sobrou nenhum item no pedido, deleta o pedido inteiro
             db.collection("pedidos").doc(pedidoId.toString()).delete();
        } else {
             // Recalcula o total e salva no Firebase
             const novoTotal = novosItens.reduce((acc, i) => acc + i.preco * i.quantidade, 0);
             const novoCusto = novosItens.reduce((acc, i) => acc + (i.custoUnitario || 0) * i.quantidade, 0);
             db.collection("pedidos").doc(pedidoId.toString()).update({
                 itens: novosItens,
                 total: novoTotal,
                 custoVenda: novoCusto
             });
        }
    }

    function alterarQtdItemMesa(pedidoId, indexItem, delta) {
        const pedido = pedidos.find(p => p.id === pedidoId);
        if(!pedido) return;
        
        const novosItens = [...pedido.itens];
        novosItens[indexItem].quantidade += delta;
        
        // Se a quantidade chegar a zero, aciona a função de remover
        if (novosItens[indexItem].quantidade <= 0) {
            removerItemMesa(pedidoId, indexItem);
            return;
        }
        
        // Recalcula o total e salva no Firebase
        const novoTotal = novosItens.reduce((acc, i) => acc + i.preco * i.quantidade, 0);
        const novoCusto = novosItens.reduce((acc, i) => acc + (i.custoUnitario || 0) * i.quantidade, 0);
        
        db.collection("pedidos").doc(pedidoId.toString()).update({
            itens: novosItens,
            total: novoTotal,
            custoVenda: novoCusto
        });
    }
    
    function fecharContaMesa(nomeMesa, pedidosDaMesa, total, metodoPagamento) {
        if(!confirm(`Confirma fechamento de ${nomeMesa}?`)) return;
        
        const custoTotal = pedidosDaMesa.reduce((acc, p) => acc + (p.custoVenda || 0), 0);
        const itensConsolidados = [];
        
        pedidosDaMesa.forEach(p => {
            itensConsolidados.push(...p.itens);
            
            // Limpa o histórico da mesa para o próximo cliente não ver
            db.collection("pedidos").doc(p.id.toString()).update({ 
                status: 'Vendido',
                nomeCliente: p.nomeCliente + ' (Fechada)' 
            });
        });
        
        const novaVenda = {
            id: uid(), data: new Date().toISOString(), itens: itensConsolidados, total: total,
            custoVenda: custoTotal, origem: `Fechamento ${nomeMesa}`, metodoPagamento,
            turnoId: caixaAtual?.id, operador: user?.username 
        };
        
        salvarVendas([...vendas, novaVenda], novaVenda);
        
        // CHAMA A IMPRESSÃO DE 1 VIA DIRETA
        if(typeof imprimirCupomFechamento === 'function') {
            imprimirCupomFechamento(nomeMesa, itensConsolidados, total, metodoPagamento);
        } else {
            alert("Erro: Função de impressão não foi encontrada!");
        }

        atualizarNomeMesa(nomeMesa, null);
        
        // Fecha o detalhe da mesa e volta para o mapa
        setMesaAtiva(null); 
        setSelected('mapa_mesas');
    }

    function transferirPedidoMesa(mesaOrigem, mesaDestino) {
        if(!confirm(`Transferir da ${mesaOrigem} para ${mesaDestino}?`)) return;
        const pedidosMesa = pedidos.filter(p => p.nomeCliente === mesaOrigem && p.status !== 'Vendido');
        pedidosMesa.forEach(p => db.collection("pedidos").doc(p.id.toString()).update({ nomeCliente: mesaDestino }));
        alert(`Transferido para ${mesaDestino}.`); setMesaAtiva(null); setSelected('mapa_mesas');
    }

    function finalizarPedidoEGerarVenda(pedido) {
      if (!confirm(`Finalizar pedido de ${pedido.nomeCliente}?`)) return;
      const custoPedido = pedido.custoVenda || pedido.itens.reduce((sum, item) => sum + (item.custoUnitario || 0) * item.quantidade, 0);
      const novaVenda = {
            id: uid(), data: new Date().toISOString(), itens: pedido.itens, total: pedido.total,
            custoVenda: custoPedido, origem: `Venda ${pedido.tipo}`, metodoPagamento: 'Não Informado',
            turnoId: caixaAtual?.id || null, operador: user?.username || 'Desconhecido'
        };
      salvarVendas([...vendas, novaVenda], novaVenda);
      
      // 🧹 MÁGICA DE LIMPEZA AQUI TAMBÉM
      db.collection("pedidos").doc(pedido.id.toString()).update({ 
          status: 'Vendido',
          nomeCliente: pedido.nomeCliente + ' (Fechada)' 
      });
      
      alert(`Venda registrada e histórico limpo!`);
    }

    const totalCarrinho = carrinho.reduce((s,i)=> s + i.preco * i.quantidade, 0);
    if(loading) return <div className="min-h-screen flex items-center justify-center bg-dark text-terracota text-2xl font-bold">Conectando Nuvem...</div>;
    if(!isLoggedIn) return <Login onLogin={(u) => { setUser(u); setIsLoggedIn(true); }} />;

    return (
      <div className="min-h-screen flex flex-col bg-slate-50">
        <Header user={user} onLogout={() => firebase.auth().signOut()} toggleMobile={() => setMobileOpen(true)} caixaAtual={caixaAtual} />
        <div className="flex flex-1 w-full overflow-hidden relative">
          <Sidebar selected={selected} setSelected={(key) => { setSelected(key); if(key !== 'pdv' && key !== 'detalhe_mesa') setMesaAtiva(null); }} totalPedidosWeb={pedidosPendentesWeb.length} user={user} onLogout={() => firebase.auth().signOut()} />
          
          {mobileOpen && (
              <div className="fixed inset-0 z-50 flex md:hidden">
                  <div className="fixed inset-0 bg-black/60" onClick={()=>setMobileOpen(false)}></div>
                  <div className="relative z-50 h-full">
                      <Sidebar selected={selected} setSelected={(key) => { setSelected(key); if(key !== 'pdv' && key !== 'detalhe_mesa') setMesaAtiva(null); }} totalPedidosWeb={pedidosPendentesWeb.length} user={user} onLogout={() => firebase.auth().signOut()} isMobile={true} closeMobile={()=>setMobileOpen(false)} />
                  </div>
              </div>
          )}

          <main className="flex-1 overflow-y-auto app-main-content">
            {selected === 'dashboard' && <DashboardView vendas={vendas} perdas={perdas} produtos={produtos} />}
            {selected === 'usuarios' && user?.role === 'admin' && <UsuariosView />}
            {selected === 'caixa_turno' && <CaixaTurnoView user={user} caixaAtual={caixaAtual} setCaixaAtual={(caixa) => { setCaixaAtual(caixa); if(caixa) db.collection("dados_restaurante").doc("caixa_atual").set({dados: JSON.stringify(caixa)}); else db.collection("dados_restaurante").doc("caixa_atual").set({dados: null}); }} vendas={vendas} />}
            
            {selected === 'pdv' && (
              caixaAtual ? <PDVView produtos={produtos} adicionarAoCarrinho={adicionarAoCarrinho} busca={busca} setBusca={setBusca} carrinho={carrinho} alterarQuantidade={alterarQuantidade} removerDoCarrinho={removerDoCarrinho} finalizarVenda={finalizarVenda} enviarPedidoMesa={enviarPedidoMesa} totalCarrinho={totalCarrinho} mesaAtiva={mesaAtiva} />
              : <div className="p-10 text-center"><h2 className="text-2xl font-bold text-red-600 bg-red-100 p-6 rounded-2xl">⚠️ Abra o Caixa (Turno) primeiro.</h2></div>
            )}
            
            {selected === 'mapa_mesas' && (
              caixaAtual ? <MapaMesasView pedidos={pedidos} selecionarMesa={(n) => { setMesaAtiva(n); setSelected('detalhe_mesa'); }} nomesMesas={nomesMesas} />
              : <div className="p-10 text-center"><h2 className="text-2xl font-bold text-red-600 bg-red-100 p-6 rounded-2xl">⚠️ Abra o Caixa (Turno) primeiro.</h2></div>
            )}

            {selected === 'detalhe_mesa' && mesaAtiva && <DetalheMesaView mesa={mesaAtiva} pedidos={pedidos} voltarMapa={() => { setMesaAtiva(null); setSelected('mapa_mesas'); }} novoPedido={() => setSelected('pdv')} fecharConta={fecharContaMesa} transferirMesa={transferirPedidoMesa} nomesMesas={nomesMesas} atualizarNomeMesa={atualizarNomeMesa} alterarQtdItemMesa={alterarQtdItemMesa} removerItemMesa={removerItemMesa} />}
            
            {selected === 'fluxo_caixa' && <FluxoCaixaView vendas={vendas} insumos={insumos} salvarInsumos={salvarInsumos} />}
            {selected === 'pedidos_web' && <PedidosWeb pedidos={pedidos} setPedidos={salvarPedidos} pedidosPendentesWeb={pedidosPendentesWeb} setPedidosPendentesWeb={setPedidosPendentesWeb} finalizarPedidoEGerarVenda={finalizarPedidoEGerarVenda} />}
            {selected === 'produtos' && <ProdutosView produtos={produtos} salvarProdutos={salvarProdutos} insumos={insumos} />}
            {selected === 'insumos' && <InsumosView insumos={insumos} salvarInsumos={salvarInsumos} />}
            {selected === 'custo_insumos' && <CustoInsumosView produtos={produtos} insumos={insumos} />}
            {selected === 'perdas' && <PerdasView produtos={produtos} insumos={insumos} salvarPerdas={salvarPerdas} salvarInsumos={salvarInsumos} salvarProdutos={salvarProdutos} />}
            {selected === 'relatorios' && <RelatoriosView vendas={vendas} perdas={perdas} produtos={produtos} />}
            {selected === 'avancado' && <RelatorioAvancado vendas={vendas} produtos={produtos} user={user} />}
          </main>
        </div>
      </div>
    );
  }

  ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
