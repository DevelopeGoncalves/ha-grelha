  /*********************
   * PDV (ATUALIZADO COM OPÇÃO DE FICHAS PARA EVENTO)
   *********************/
  function PDVView({produtos, adicionarAoCarrinho, busca, setBusca, carrinho, alterarQuantidade, removerDoCarrinho, finalizarVenda, enviarPedidoMesa, totalCarrinho, mesaAtiva}){
    const [categoriaAtiva, setCategoriaAtiva] = useState('Todos');
    const [pagando, setPagando] = useState(false);
    
    // Estado para saber se vai imprimir Cupom Normal ou Fichas
    const [tipoImpressao, setTipoImpressao] = useState('normal'); 
    
    const [metodoDinheiro, setMetodoDinheiro] = useState(false);
    const [valorRecebido, setValorRecebido] = useState('');

    const categorias = useMemo(() => {
      const cats = produtos.map(p => p.categoria);
      return ['Todos', ...new Set(cats.filter(c => c))];
    }, [produtos]);

    const produtosFiltrados = produtos.filter(p => {
      const matchesBusca = p.nome.toLowerCase().includes(busca.toLowerCase()) || 
                           p.categoria.toLowerCase().includes(busca.toLowerCase());
      const matchesCategoria = categoriaAtiva === 'Todos' || p.categoria === categoriaAtiva;
      return matchesBusca && matchesCategoria;
    });

    if (pagando && metodoDinheiro) {
        const troco = Number(String(valorRecebido).replace(',', '.')) - totalCarrinho;
        return (
            <div className="p-8 flex flex-col items-center justify-center h-full bg-slate-100">
                <div className="bg-white p-6 rounded-xl shadow-xl w-full max-w-md text-center border-4 border-green-500">
                    <h3 className="text-xl font-bold mb-2 text-green-700">Pagamento em Dinheiro</h3>
                    <div className="text-3xl font-bold text-gray-800 mb-6">Total: {currency(totalCarrinho)}</div>
                    
                    <div className="mb-4 text-left">
                        <label className="block text-sm font-bold text-gray-700 mb-2">Valor entregue pelo cliente (R$):</label>
                        <input type="number" step="0.01" value={valorRecebido} onChange={e => setValorRecebido(e.target.value)} className="w-full p-4 text-3xl text-center border-2 border-green-500 rounded-xl focus:outline-none focus:ring-4 focus:ring-green-200" placeholder="Ex: 100" autoFocus />
                    </div>

                    <div className="flex justify-center gap-2 mb-6">
                         <button onClick={() => setValorRecebido(totalCarrinho)} className="px-4 py-2 bg-gray-200 rounded-lg text-sm font-bold hover:bg-gray-300">Exato</button>
                         <button onClick={() => setValorRecebido(50)} className="px-4 py-2 bg-gray-200 rounded-lg text-sm font-bold hover:bg-gray-300">R$ 50</button>
                         <button onClick={() => setValorRecebido(100)} className="px-4 py-2 bg-gray-200 rounded-lg text-sm font-bold hover:bg-gray-300">R$ 100</button>
                    </div>
                    
                    {valorRecebido && troco >= 0 && (
                        <div className="mb-6 p-4 bg-green-100 rounded-xl border border-green-300 animate-pulse">
                            <div className="text-sm text-green-700 font-bold uppercase">Troco a devolver:</div>
                            <div className="text-5xl font-extrabold text-green-700">{currency(troco)}</div>
                        </div>
                    )}
                    {valorRecebido && troco < 0 && (
                        <div className="mb-6 p-2 text-red-500 font-bold text-lg">Faltam {currency(Math.abs(troco))}</div>
                    )}

                    <div className="flex gap-3">
                        <button onClick={() => { setMetodoDinheiro(false); setValorRecebido(''); }} className="flex-1 py-4 bg-gray-200 text-gray-800 rounded-xl font-bold hover:bg-gray-300 transition">Voltar</button>
                        <button 
                            // PASSA O TIPO DE IMPRESSÃO (normal ou ficha)
                            onClick={() => { finalizarVenda('Dinheiro', tipoImpressao); setPagando(false); setMetodoDinheiro(false); setValorRecebido(''); }} 
                            disabled={!valorRecebido || troco < 0}
                            className="flex-1 py-4 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 disabled:opacity-50 transition"
                        >
                            Finalizar Venda
                        </button>
                    </div>
                </div>
            </div>
        )
    }

    if (pagando && !metodoDinheiro) {
        return (
            <div className="p-8 flex flex-col items-center justify-center h-full bg-slate-100">
                <div className="bg-white p-6 rounded-xl shadow-xl w-full max-w-md text-center border-2 border-terracota">
                    <h3 className="text-xl font-bold mb-4">Venda Balcão: {currency(totalCarrinho)}</h3>
                    <p className="mb-4 text-gray-600">Como o cliente vai pagar?</p>
                    <div className="space-y-3">
                        <button onClick={() => setMetodoDinheiro(true)} className="w-full py-4 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 shadow flex justify-center gap-2">💵 Dinheiro</button>
                        {/* PASSA O TIPO DE IMPRESSÃO PARA O PIX E CARTÃO */}
                        <button onClick={() => { finalizarVenda('Pix', tipoImpressao); setPagando(false); }} className="w-full py-4 bg-teal-600 text-white rounded-xl font-bold hover:bg-teal-700 shadow flex justify-center gap-2">💠 Pix</button>
                        <button onClick={() => { finalizarVenda('Cartão', tipoImpressao); setPagando(false); }} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow flex justify-center gap-2">💳 Cartão</button>
                    </div>
                    <button onClick={()=>setPagando(false)} className="mt-6 text-red-500 font-bold hover:underline">Cancelar e Voltar</button>
                </div>
            </div>
        )
    }

    return (
      <div className="space-y-4">
        {mesaAtiva && (
            <div className="bg-terracota text-white p-3 rounded-xl font-bold text-center text-lg shadow">
                📝 Anotando Pedido para: {mesaAtiva}
            </div>
        )}
        <div className="bg-white p-4 rounded-2xl shadow space-y-4">
          <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Pesquisar produto..." className="w-full p-3 border rounded-xl focus:ring-2 focus:ring-terracota transition" />
          <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
            {categorias.map(cat => (
              <button key={cat} onClick={() => setCategoriaAtiva(cat)} className={`px-6 py-2 rounded-full whitespace-nowrap font-medium transition ${categoriaAtiva === cat ? 'bg-terracota text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{cat}</button>
            ))}
          </div>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div className="lg:col-span-2">
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
              {produtosFiltrados.map(produto => (
                <div key={produto.id} onClick={()=>adicionarAoCarrinho(produto)} className={`p-4 rounded-2xl border cursor-pointer shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition bg-white ${produto.manutencao ? 'opacity-50 cursor-not-allowed border-red-400' : 'border-gray-200'}`}>
                  {produto.imagemUrl && !produto.imagemUrl.includes('placeholder') ? (
                      <img src={produto.imagemUrl} alt={produto.nome} className="w-full h-24 object-contain rounded-xl mb-3" />
                  ) : (
                      <div className="w-full h-24 bg-gray-100 rounded-xl mb-3 flex items-center justify-center text-3xl">{produto.emoji}</div>
                  )}
                  <div className="flex items-start justify-between gap-3">
                    <div>
                      <div className="text-xs font-bold text-terracota uppercase">{produto.categoria}</div>
                      <div className="font-semibold text-lg mt-1">{produto.nome}</div>
                    </div>
                    <div className="text-right">
                      <div className="text-gray-900 font-bold text-lg">{currency(produto.preco)}</div>
                    </div>
                  </div>
                </div>
              ))}
              {produtosFiltrados.length === 0 && <div className="col-span-full py-10 text-center text-gray-400">Nenhum produto encontrado.</div>}
            </div>
          </div>

          <div className="bg-white p-4 rounded-2xl shadow h-fit sticky top-20 flex flex-col">
            <h3 className="font-bold text-lg flex items-center gap-2 text-terracota">🧾 Carrinho</h3>
            <div className="mt-3 flex-1 max-h-96 overflow-y-auto space-y-3">
               {carrinho.map(item=>(
                 <div key={item.id} className="p-3 border rounded-lg">
                    <div className="flex justify-between font-medium">
                      <span>{item.nome}</span>
                      <span>{currency(item.preco * item.quantidade)}</span>
                    </div>
                    <div className="flex items-center gap-2 mt-2">
                      <button onClick={()=>alterarQuantidade(item.id, item.quantidade - 1)} className="px-2 border rounded">-</button>
                      <span>{item.quantidade}</span>
                      <button onClick={()=>alterarQuantidade(item.id, item.quantidade + 1)} className="px-2 border rounded">+</button>
                      <button onClick={()=>removerDoCarrinho(item.id)} className="ml-auto text-red-500 text-xs">Remover</button>
                    </div>
                 </div>
               ))}
            </div>
            <div className="mt-4 border-t pt-3">
               <div className="flex justify-between font-bold text-xl mb-4">
                 <span>Total</span>
                 <span>{currency(totalCarrinho)}</span>
               </div>
               
               {mesaAtiva ? (
                   <button onClick={enviarPedidoMesa} disabled={carrinho.length === 0} className="w-full py-3 bg-terracota text-white rounded-xl font-bold disabled:opacity-50 hover:bg-redBrown transition">
                     🚀 Enviar para {mesaAtiva}
                   </button>
               ) : (
                   <div className="flex flex-col gap-2">
                       <button 
                         onClick={()=>{setTipoImpressao('normal'); setPagando(true);}}
                         disabled={carrinho.length === 0}
                         className="w-full py-3 bg-green-600 text-white rounded-xl font-bold disabled:opacity-50 hover:bg-green-700 transition flex justify-center items-center gap-2"
                       >
                         ✅ Vender (Cupom Normal)
                       </button>
                       <button 
                         onClick={()=>{setTipoImpressao('ficha'); setPagando(true);}}
                         disabled={carrinho.length === 0}
                         className="w-full py-3 bg-purple-600 text-white rounded-xl font-bold disabled:opacity-50 hover:bg-purple-700 transition flex justify-center items-center gap-2 border-2 border-purple-800"
                       >
                         🎟️ Vender (Fichas de Evento)
                       </button>
                   </div>
               )}
            </div>
          </div>
        </div>
      </div>
    );
  }
  
  function PedidosWeb({ pedidos, setPedidos, pedidosPendentesWeb, setPedidosPendentesWeb, finalizarPedidoEGerarVenda }) {
    
    function aceitarPedido(pedido) {
        if (!confirm(`Aceitar pedido de ${pedido.nomeCliente} e enviá-lo para preparo?`)) return;

        const novoPedidoCozinha = {
            id: uid(),
            data: new Date().toISOString(),
            nomeCliente: pedido.nomeCliente,
            itens: pedido.itens,
            total: pedido.total,
            status: 'Pendente',
            tipo: 'Venda Web',
            itens: pedido.itens.map(item => {
                const produtoBase = initialProdutos.find(p => p.id === item.id || String(p.id).replace('.', '-') === String(item.id));
                return { ...item, custoUnitario: produtoBase?.custoProduto || 0 };
            })
        };

        setPedidos(prevPedidos => [...prevPedidos, novoPedidoCozinha]);

        const novosWeb = pedidosPendentesWeb.filter(p => p.id !== pedido.id);
        setPedidosPendentesWeb(novosWeb);
        
        localStorage.setItem('pedidos_web_pendentes', JSON.stringify(novosWeb.map(p => ({
             id: p.id,
             data: p.data,
             nomeCliente: p.nomeCliente,
             itens: p.itens,
             total: p.total
        }))));
    }
    
    function rejeitarPedido(pedido) {
        if (!confirm(`Rejeitar pedido de ${pedido.nomeCliente}? Isso irá removê-lo.`)) return;
        
        const novosWeb = pedidosPendentesWeb.filter(p => p.id !== pedido.id);
        setPedidosPendentesWeb(novosWeb);
        localStorage.setItem('pedidos_web_pendentes', JSON.stringify(novosWeb.map(p => ({
             id: p.id,
             data: p.data,
             nomeCliente: p.nomeCliente,
             itens: p.itens,
             total: p.total
        }))));
    }
    
    function alterarStatus(id, novoStatus) {
      const novosPedidos = pedidos.map(p => p.id === id ? { ...p, status: novoStatus } : p);
      setPedidos(novosPedidos);
    }
    
    const pedidosPendentes = pedidos.filter(p => p.status === 'Pendente');
    const pedidosEmPreparo = pedidos.filter(p => p.status === 'Em Preparo');
    const pedidosFinalizados = pedidos.filter(p => p.status === 'Vendido');

    return (
      <div className="space-y-6">
        <h2 className="text-3xl font-extrabold text-gray-800 border-b pb-2 flex items-center gap-3">
          <span className="text-4xl text-terracota">🌐</span> Gestão de Pedidos (Visualização Admin)
        </h2>
        
        <p className="text-sm text-gray-600 bg-yellow-100 p-3 rounded-xl border border-yellow-300">
            🔔 Nota: Esta tela é uma visualização administrativa. A tela principal da cozinha para o preparo e finalização de pedidos deve ser acessada via **`cozinha.html`**.
        </p>

        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div className="p-4 rounded-2xl shadow border border-red-200 bg-red-50">
            <h3 className="font-bold text-xl mb-4 text-red-700">NOVOS ({pedidosPendentesWeb.length + pedidosPendentes.length})</h3>
            <div className="space-y-4 max-h-[70vh] overflow-y-auto">
              {pedidosPendentesWeb.map(p => (
                <div key={p.id} className="p-3 bg-white rounded-xl shadow-md border-2 border-green-500">
                  <div className="font-bold text-lg text-green-700 flex justify-between items-center">
                      <span>{p.nomeCliente}</span>
                      <span className="text-sm bg-green-100 text-green-700 px-2 py-0.5 rounded-full">WEB</span>
                  </div>
                  <div className="text-xs text-gray-500 mb-2">Recebido em: {new Date(p.data).toLocaleTimeString()}</div>
                  <ul className="list-disc list-inside text-sm mb-3 ml-3">
                    {p.itens.map(it => <li key={it.id}>{it.quantidade}x {it.nome}</li>)}
                  </ul>
                  <div className="font-bold text-lg text-terracota">Total: {currency(p.total)}</div>

                  <div className="mt-3 flex gap-2">
                    <button onClick={() => aceitarPedido(p)} className="flex-1 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600">✅ Aceitar</button>
                    <button onClick={() => rejeitarPedido(p)} className="py-2 px-4 bg-red-500 text-white rounded-lg hover:bg-red-600">✕</button>
                  </div>
                </div>
              ))}
              
              {pedidosPendentes.map(p => (
                <div key={p.id} className="p-3 bg-white rounded-xl shadow-md border border-red-300">
                  <div className="font-bold text-lg text-red-600 flex justify-between items-center">
                    <span>{p.nomeCliente}</span>
                    <span className="text-sm bg-red-100 text-red-700 px-2 py-0.5 rounded-full">{p.tipo === 'Venda Direta' ? 'PDV' : p.tipo}</span>
                  </div>
                  <div className="text-xs text-gray-500 mb-2">Data: {new Date(p.data).toLocaleTimeString()}</div>
                  <ul className="list-disc list-inside text-sm mb-3 ml-3">
                    {p.itens.map(it => <li key={it.id}>{it.quantidade}x {it.nome}</li>)}
                  </ul>
                  <div className="font-bold text-lg">{currency(p.total)}</div>

                  <button onClick={() => alterarStatus(p.id, 'Em Preparo')} className="w-full mt-3 py-2 bg-terracota text-white rounded-lg hover:bg-redBrown">Iniciar Preparo</button>
                </div>
              ))}
              
              {pedidosPendentesWeb.length === 0 && pedidosPendentes.length === 0 && <div className="text-gray-500 text-center py-6">Nenhum novo pedido</div>}
            </div>
          </div>

          <div className="p-4 rounded-2xl shadow border border-yellow-200 bg-yellow-50">
            <h3 className="font-bold text-xl mb-4 text-yellow-700">EM PREPARO - {pedidosEmPreparo.length}</h3>
            <div className="space-y-4 max-h-[70vh] overflow-y-auto">
              {pedidosEmPreparo.map(p => {
                return (
                  <div key={p.id} className={`p-3 bg-white rounded-xl shadow-md border border-yellow-300`}>
                    <div className={`font-bold text-xl text-yellow-600`}>
                      {p.nomeCliente}
                    </div>
                  <div className="text-xs text-gray-500 mb-2">Origem: {p.tipo}</div>
                    <ul className="list-disc list-inside text-sm mb-3 ml-3">
                      {p.itens.map(it => <li key={it.id}>{it.quantidade}x {it.nome}</li>)}
                    </ul>
                    <div className="font-bold text-lg">{currency(p.total)}</div>
                    
                    <button 
                      onClick={() => finalizarPedidoEGerarVenda(p)} 
                      className="w-full mt-3 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600"
                    >
                      ✅ Finalizar e Vender
                    </button>
                  </div>
                );
              })}
              {pedidosEmPreparo.length === 0 && <div className="text-gray-500 text-center py-6">Nenhum em preparo</div>}
            </div>
          </div>
          
          <div className="p-4 rounded-2xl shadow border border-green-200 bg-green-50">
            <h3 className="font-bold text-xl mb-4 text-green-700">FINALIZADOS (Últimos 5)</h3>
            <div className="space-y-4 max-h-[70vh] overflow-y-auto">
              {pedidosFinalizados.sort((a,b) => new Date(b.data) - new Date(a.data)).slice(0, 5).map(p => ( 
                <div key={p.id} className="p-3 bg-white rounded-xl shadow-md border border-green-300">
                  <div className="font-bold text-lg text-green-600">{p.nomeCliente}</div>
                  <div className="text-xs text-gray-500">{new Date(p.data).toLocaleTimeString()}</div>
                  <div className="text-right font-bold text-lg">{currency(p.total)}</div>
                </div>
              ))}
              {pedidosFinalizados.length === 0 && <div className="text-gray-500 text-center py-6">Nenhum finalizado</div>}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // --- NOVA VIEW: FLUXO DE CAIXA E HISTÓRICO ---
  function FluxoCaixaView({ vendas, insumos, salvarInsumos }) { 
      const [transacoes, setTransacoes] = useState([]);
      const [tipoMov, setTipoMov] = useState('Sangria');
      const [valorMov, setValorMov] = useState('');
      const [descMov, setDescMov] = useState('');

      useEffect(() => {
          // Puxa as transações do Firebase
          db.collection("dados_restaurante").doc("transacoes_caixa").get().then(doc => {
              if (doc.exists && doc.data().dados) setTransacoes(JSON.parse(doc.data().dados));
          });
      }, []);

      const timeline = useMemo(() => {
          const listaVendas = vendas.map(v => ({ id: v.id, data: v.data, tipo: 'Venda', descricao: v.origem + (v.metodoPagamento ? ` (${v.metodoPagamento})` : ''), valor: v.total, metodo: v.metodoPagamento || 'Desconhecido', isEntrada: true }));
          const listaTransacoes = transacoes.map(t => ({ id: t.id, data: t.data, tipo: t.tipo, descricao: t.descricao, valor: t.valor, metodo: 'Dinheiro', isEntrada: t.tipo === 'Suprimento' }));
          return [...listaVendas, ...listaTransacoes].sort((a,b) => new Date(b.data) - new Date(a.data));
      }, [vendas, transacoes]);

      const resumo = useMemo(() => {
          let totalDinheiro = 0, totalPix = 0, totalCartao = 0, totalSangria = 0, totalSuprimento = 0;
          timeline.forEach(item => {
              if (item.tipo === 'Venda') {
                  if (item.metodo === 'Dinheiro') totalDinheiro += item.valor;
                  else if (item.metodo === 'Pix') totalPix += item.valor;
                  else if (item.metodo === 'Cartão') totalCartao += item.valor;
                  else totalDinheiro += item.valor; 
              } else if (item.tipo === 'Sangria') { totalSangria += item.valor; totalDinheiro -= item.valor;
              } else if (item.tipo === 'Suprimento') { totalSuprimento += item.valor; totalDinheiro += item.valor; }
          });
          return { totalDinheiro, totalPix, totalCartao, totalSangria, totalSuprimento };
      }, [timeline]);

      function addMovimento(e) {
          e.preventDefault();
          if(!valorMov || !descMov) return;
          const novo = { id: uid(), data: new Date().toISOString(), tipo: tipoMov, valor: parseFloat(valorMov), descricao: descMov };
          const novaLista = [...transacoes, novo];
          setTransacoes(novaLista);
          
          // Salva na nuvem direto
          db.collection("dados_restaurante").doc("transacoes_caixa").set({dados: JSON.stringify(novaLista)});
          setValorMov(''); setDescMov('');
      }

      return (
          <div className="p-6 space-y-6">
              <h2 className="text-3xl font-extrabold text-gray-800 border-b pb-2">💸 Fluxo de Caixa & Fechamento</h2>
              <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                  <div className="bg-white p-4 rounded-2xl shadow border-l-4 border-green-500">
                      <div className="text-xs font-bold text-gray-500 uppercase">Dinheiro (Gaveta)</div><div className="text-2xl font-bold text-green-700">{currency(resumo.totalDinheiro)}</div>
                  </div>
                  <div className="bg-white p-4 rounded-2xl shadow border-l-4 border-teal-500">
                      <div className="text-xs font-bold text-gray-500 uppercase">Pix</div><div className="text-2xl font-bold text-teal-700">{currency(resumo.totalPix)}</div>
                  </div>
                  <div className="bg-white p-4 rounded-2xl shadow border-l-4 border-blue-500">
                      <div className="text-xs font-bold text-gray-500 uppercase">Cartão</div><div className="text-2xl font-bold text-blue-700">{currency(resumo.totalCartao)}</div>
                  </div>
                  <div className="bg-gray-100 p-4 rounded-2xl border text-center">
                      <div className="text-sm font-bold text-gray-600">Total Geral</div><div className="text-xl font-bold text-gray-800">{currency(resumo.totalDinheiro + resumo.totalPix + resumo.totalCartao + resumo.totalSangria - resumo.totalSuprimento)}</div>
                  </div>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                  <div className="bg-white p-5 rounded-2xl shadow h-fit">
                      <h3 className="font-bold mb-3">Registrar Movimentação</h3>
                      <form onSubmit={addMovimento} className="space-y-3">
                          <div className="flex gap-2">
                              <button type="button" onClick={()=>setTipoMov('Sangria')} className={`flex-1 py-2 rounded-lg font-bold border ${tipoMov==='Sangria'?'bg-red-500 text-white':'bg-gray-100'}`}>Sangria (-)</button>
                              <button type="button" onClick={()=>setTipoMov('Suprimento')} className={`flex-1 py-2 rounded-lg font-bold border ${tipoMov==='Suprimento'?'bg-green-500 text-white':'bg-gray-100'}`}>Suprimento (+)</button>
                          </div>
                          <input type="number" step="0.01" value={valorMov} onChange={e=>setValorMov(e.target.value)} placeholder="Valor (R$)" className="w-full p-3 border rounded-xl" required />
                          <input value={descMov} onChange={e=>setDescMov(e.target.value)} placeholder="Motivo" className="w-full p-3 border rounded-xl" required />
                          <button className="w-full py-3 bg-gray-800 text-white rounded-xl font-bold">Salvar</button>
                      </form>
                  </div>
                  <div className="lg:col-span-2 bg-white p-5 rounded-2xl shadow">
                      <h3 className="font-bold mb-3">Histórico (Hoje)</h3>
                      <div className="max-h-[400px] overflow-y-auto space-y-2">
                          {timeline.map(item => (
                              <div key={item.id} className="flex justify-between items-center p-3 border rounded-lg hover:bg-gray-50">
                                  <div><div className="font-bold text-gray-800">{item.descricao}</div><div className="text-xs text-gray-500">{new Date(item.data).toLocaleTimeString()} • {item.tipo}</div></div>
                                  <div className={`font-bold ${item.isEntrada ? 'text-green-600' : 'text-red-600'}`}>{item.isEntrada ? '+' : '-'}{currency(item.valor)}</div>
                              </div>
                          ))}
                      </div>
                  </div>
              </div>
          </div>
      );
  }

  /*********************
   * Gestão de Produtos (Venda)
   *********************/
  function ProdutosView({produtos, salvarProdutos, insumos}){
    const [form, setForm] = useState({ id:null, nome:'', preco:'', estoque:'', categoria:'', imagemUrl:'', fichaTecnica: [] });
    const [insumoForm, setInsumoForm] = useState({ idInsumo: '', quantidade: '' });
    
    // --- NOVOS ESTADOS PARA O UPLOAD DA FOTO ---
    const [imagemUpload, setImagemUpload] = useState(null);
    const [uploading, setUploading] = useState(false);
    
    // Novo estado para quando for criar uma Categoria Nova
    const [novaCategoria, setNovaCategoria] = useState('');
    
    // Estados para filtro
    const [busca, setBusca] = useState('');
    const [categoriaFiltro, setCategoriaFiltro] = useState('Todas');
    
    const insumosMap = insumos.reduce((map, i) => { map[i.id] = i; return map; }, {});

    useEffect(() => {
        if(form.id) {
             const produtoParaEditar = produtos.find(p => p.id === form.id);
             setForm(p => ({ 
                 ...p, 
                 fichaTecnica: produtoParaEditar.fichaTecnica || [] 
             }));
        }
    }, [form.id]);

    // Extrair categorias para o filtro e para o Dropdown (Select)
    const listaCategorias = useMemo(() => {
        const cats = produtos.map(p => p.categoria).filter(c => c && c.trim() !== '');
        return ['Todas', ...new Set(cats)];
    }, [produtos]);

    const categoriasParaSelect = listaCategorias.filter(c => c !== 'Todas');

    // Filtrar produtos na tabela
    const produtosFiltrados = produtos.filter(p => {
        const matchesBusca = p.nome.toLowerCase().includes(busca.toLowerCase());
        const matchesCategoria = categoriaFiltro === 'Todas' || p.categoria === categoriaFiltro;
        return matchesBusca && matchesCategoria;
    });

    async function submit(e){
      e.preventDefault();
      if(!form.nome || !form.preco || !form.estoque) return alert('Preencha os campos obrigatórios');
      
      let catFinal = form.categoria;
      if (catFinal === 'NOVA') {
          if (!novaCategoria.trim()) return alert('Digite o nome da nova categoria.');
          catFinal = novaCategoria.trim();
      } else if (!catFinal) return alert('Selecione uma categoria.');

      setUploading(true);
      let imgFinal = form.imagemUrl; // Mantém a imagem antiga por padrão

      try {
          // SE O USUÁRIO SELECIONOU UMA FOTO NOVA, FAZ O UPLOAD PRO SUPABASE
          if (imagemUpload) {
              // ========================================================
              // 🚀 CÓDIGO SUPABASE REAL (Descomente quando for migrar)
              // ========================================================
              const fileExt = imagemUpload.name.split('.').pop();
              const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;
              const filePath = `fotos/${fileName}`;

              // 1. Sobe o arquivo pro bucket 'cardapio'
              const { error: uploadError } = await window.supabaseClient.storage.from('cardapio').upload(filePath, imagemUpload);
              if (uploadError) throw uploadError;

              // 2. Pega o Link Público da imagem gerada
              const { data } = await window.supabaseClient.storage.from('cardapio').getPublicUrl(filePath);
              imgFinal = data.publicUrl;
          }

          const novoId = form.id || uid();
          const novo = { 
            ...form, preco: Number(form.preco), estoque: Number(form.estoque), categoria: catFinal,
            imagemUrl: imgFinal, id: novoId 
          };
          
          novo.custoProduto = calcularCusto(novo, insumosMap);

          let novos = form.id ? produtos.map(p=> p.id===form.id ? novo : p) : [...produtos, novo];
          
          salvarProdutos(novos);
          setForm({ id:null, nome:'', preco:'', estoque:'', categoria:'', imagemUrl:'', fichaTecnica: [] });
          setNovaCategoria('');
          setImagemUpload(null);
          
      } catch (error) {
          alert("Erro ao fazer upload da imagem: " + error.message);
      } finally {
          setUploading(false);
      }
    }

    function editar(p){ 
        // Descasca a imagem para o usuário editar de forma limpa (tira o img/ e o .jpg)
        let imgLimpa = p.imagemUrl || '';
        if (imgLimpa.startsWith('img/') && imgLimpa.endsWith('.jpg')) {
            imgLimpa = imgLimpa.replace('img/', '').replace('.jpg', '');
        }

        setForm({...p, preco: String(p.preco), estoque: String(p.estoque), imagemUrl: imgLimpa, categoria: p.categoria || '', fichaTecnica: p.fichaTecnica || [] }); 
        setNovaCategoria('');
    }
    
    function excluir(p){ if(!confirm(`Excluir ${p.nome}?`)) return; salvarProdutos(produtos.filter(x=>x.id!==p.id)); }
    
    function adicionarInsumo() {
        if (!insumoForm.idInsumo || !insumoForm.quantidade) return;
        const insumoExistente = form.fichaTecnica.find(i => i.idInsumo === insumoForm.idInsumo);
        if (insumoExistente) {
            alert("Insumo já adicionado. Edite a quantidade.");
            return;
        }
        
        const insumoData = insumosMap[insumoForm.idInsumo];

        setForm({
            ...form,
            fichaTecnica: [
                ...form.fichaTecnica,
                {
                    idInsumo: insumoForm.idInsumo,
                    quantidade: Number(insumoForm.quantidade),
                    unidade: insumoData.unidade,
                }
            ]
        });
        setInsumoForm({ idInsumo: '', quantidade: '' });
    }
    
    function removerInsumo(idInsumo) {
        setForm({
            ...form,
            fichaTecnica: form.fichaTecnica.filter(i => i.idInsumo !== idInsumo)
        });
    }

    // Calcula URL do preview na hora (para não quebrar a imagem na tela)
    const previewFoto = form.imagemUrl.includes('/') || form.imagemUrl.includes('.') 
                        ? form.imagemUrl 
                        : (form.imagemUrl ? `img/${form.imagemUrl}.jpg` : '');

    return (
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div className="bg-white p-4 rounded-2xl shadow lg:col-span-1">
          <h3 className="font-bold mb-3">{form.id ? 'Editar' : 'Novo'} Produto</h3>
          <form onSubmit={submit} className="space-y-3">
            <input value={form.nome} onChange={e=>setForm({...form, nome:e.target.value})} placeholder="Nome (Ex: Porção de Torresmo)" className="w-full p-3 border rounded-xl" required />
            <input value={form.preco} onChange={e=>setForm({...form, preco:e.target.value})} placeholder="Preço Final (R$)" type="number" step="0.01" className="w-full p-3 border rounded-xl" required />
            <input value={form.estoque} onChange={e=>setForm({...form, estoque:e.target.value})} placeholder="Estoque Disponível" type="number" className="w-full p-3 border rounded-xl" required />
            
            {/* SELEÇÃO DE CATEGORIA INTELIGENTE */}
            <select value={form.categoria} onChange={e=>setForm({...form, categoria:e.target.value})} className="w-full p-3 border rounded-xl bg-gray-50 focus:ring-2 focus:ring-terracota" required>
                <option value="">Selecione a Categoria</option>
                {categoriasParaSelect.map(c => <option key={c} value={c}>{c}</option>)}
                <option value="NOVA" className="font-bold text-terracota">➕ Criar Nova Categoria</option>
            </select>
            
            {form.categoria === 'NOVA' && (
                <input value={novaCategoria} onChange={e=>setNovaCategoria(e.target.value)} placeholder="Nome da Nova Categoria (Ex: Sobremesas)" className="w-full p-3 border-2 border-terracota rounded-xl bg-orange-50 animate-pulse" required />
            )}
            
            {/* NOVO INPUT DE FOTO PARA SUPABASE */}
            <div className="border border-gray-200 rounded-xl p-3 bg-gray-50">
                <span className="text-xs font-bold text-gray-500 uppercase">Foto do Produto</span>
                
                <input 
                    type="file" 
                    accept="image/*"
                    onChange={e => setImagemUpload(e.target.files[0])} 
                    className="w-full mt-1 p-2 border rounded-lg bg-white text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-terracota hover:file:bg-orange-100" 
                />
                
                <p className="text-[10px] text-gray-400 mt-1">* Escolha uma foto do seu computador/celular. Se não escolher, manterá a atual.</p>
                
                {/* Mostra a foto atual salva ou um preview da foto nova que o usuário acabou de selecionar */}
                {(imagemUpload || form.imagemUrl) && (
                    <div className="mt-3 text-center">
                        <img 
                            src={imagemUpload ? URL.createObjectURL(imagemUpload) : form.imagemUrl} 
                            alt="Preview" 
                            className="w-full h-32 object-contain rounded-lg border bg-white shadow-sm" 
                            onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/150?text=Sem+Foto'; }} 
                        />
                    </div>
                )}
            </div>
            
            {/* FICHA TÉCNICA (INSUMOS) */}
            <div className="border-t pt-3 mt-4">
                <h4 className="font-bold text-sm mb-2 text-terracota">Ficha Técnica (Receita)</h4>
                
                <div className="space-y-2 mb-3 max-h-32 overflow-y-auto">
                    {form.fichaTecnica.map(item => (
                        <div key={item.idInsumo} className="flex justify-between items-center bg-white border p-2 rounded-lg text-sm shadow-sm">
                            <span className="font-medium truncate pr-2">{insumosMap[item.idInsumo]?.nome || 'Insumo Excluído'}</span>
                            <div className="flex items-center gap-2 whitespace-nowrap">
                                <span className="bg-gray-100 px-2 py-0.5 rounded">{item.quantidade} {item.unidade}</span>
                                <button type="button" onClick={() => removerInsumo(item.idInsumo)} className="text-red-500 font-bold hover:text-red-700">✕</button>
                            </div>
                        </div>
                    ))}
                    {form.fichaTecnica.length === 0 && <p className="text-xs text-gray-400 italic text-center py-2">Nenhum insumo vinculado. (Controle de estoque manual)</p>}
                </div>

                <div className="flex gap-2 mb-3">
                    <select value={insumoForm.idInsumo} onChange={e => setInsumoForm({...insumoForm, idInsumo: e.target.value})} className="flex-1 p-2 text-sm border rounded-xl">
                        <option value="">Buscar Insumo...</option>
                        {insumos.map(i => <option key={i.id} value={i.id}>{i.nome} ({i.unidade})</option>)}
                    </select>
                    <input value={insumoForm.quantidade} onChange={e => setInsumoForm({...insumoForm, quantidade: e.target.value})} placeholder="Qtd" type="number" step="any" className="w-16 p-2 text-sm border rounded-xl text-center" />
                    <button type="button" onClick={adicionarInsumo} className="px-3 bg-green-500 text-white font-bold rounded-xl shadow hover:bg-green-600 transition">+</button>
                </div>
            </div>

            <div className="flex gap-3 pt-2">
              <button disabled={uploading} className="flex-1 py-3 bg-gradient-to-r from-terracota to-redBrown text-white rounded-xl font-bold shadow-lg hover:shadow-xl transition disabled:opacity-50">
                  {uploading ? 'Enviando Foto...' : form.id ? 'Atualizar Produto' : 'Adicionar Produto'}
              </button>
              {form.id && <button type="button" disabled={uploading} onClick={()=>{ setForm({ id:null, nome:'', preco:'', estoque:'', categoria:'', imagemUrl:'', fichaTecnica:[] }); setNovaCategoria(''); setImagemUpload(null); }} className="py-3 px-4 border-2 border-gray-300 text-gray-600 font-bold rounded-xl hover:bg-gray-100 transition disabled:opacity-50">Cancelar</button>}
            </div>
          </form>
        </div>

        <div className="lg:col-span-2 bg-white p-4 rounded-2xl shadow">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3 border-b pb-3">
             <h3 className="font-bold text-lg text-gray-800 whitespace-nowrap">Cardápio Cadastrado</h3>
             <div className="flex flex-1 w-full sm:w-auto gap-2">
                <input 
                    value={busca} 
                    onChange={e => setBusca(e.target.value)} 
                    placeholder="🔍 Buscar produto..." 
                    className="w-full sm:w-48 p-2 text-sm border bg-gray-50 rounded-lg focus:outline-none focus:ring-2 focus:ring-terracota"
                />
                <select 
                    value={categoriaFiltro} 
                    onChange={e => setCategoriaFiltro(e.target.value)} 
                    className="p-2 text-sm border bg-gray-50 rounded-lg focus:outline-none focus:ring-2 focus:ring-terracota font-semibold"
                >
                    {listaCategorias.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
             </div>
          </div>
          
          <div className="overflow-x-auto max-h-[600px] overflow-y-auto">
            <table className="w-full text-sm text-left">
              <thead className="bg-gray-100 text-gray-600 sticky top-0 shadow-sm">
                <tr>
                  <th className="p-3 rounded-tl-lg">Produto</th>
                  <th className="p-3">Categoria</th>
                  <th className="p-3 text-right">Preço</th>
                  <th className="p-3 text-right">Custo</th>
                  <th className="p-3 text-center rounded-tr-lg">Ações</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {produtosFiltrados.map(p=>(
                  <tr key={p.id} className="hover:bg-orange-50 transition">
                    <td className="p-3 font-medium text-gray-800 flex items-center">
                        {p.imagemUrl && !p.imagemUrl.includes('placeholder') ? (
                          <img src={p.imagemUrl} alt="" className="w-10 h-10 object-cover rounded shadow-sm mr-3 border" />
                        ) : (
                          <span className="text-2xl mr-3 inline-block bg-gray-100 p-1 rounded border">{p.emoji || '🍽️'}</span>
                        )}
                        {p.nome}
                    </td>
                    <td className="p-3 text-gray-500">
                        <span className="bg-gray-100 px-2 py-1 rounded text-xs uppercase font-bold">{p.categoria}</span>
                    </td>
                    <td className="p-3 text-right font-bold">{currency(p.preco)}</td>
                    <td className="p-3 text-right text-red-500 font-semibold">{currency(p.custoProduto)}</td>
                    <td className="p-3 text-center">
                      <div className="flex items-center justify-center gap-4">
                        <button onClick={()=>editar(p)} className="text-blue-600 hover:text-blue-800 font-bold transition">Editar</button>
                        <button onClick={()=>excluir(p)} className="text-red-500 hover:text-red-700 font-bold transition">Excluir</button>
                    </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            {produtosFiltrados.length === 0 && (
                <div className="p-10 text-center text-gray-400 border-2 border-dashed rounded-xl mt-4">Nenhum produto cadastrado ou encontrado na busca.</div>
            )}
          </div>
        </div>
      </div>
    );
  }
  
  function InsumosView({ insumos, salvarInsumos }) {
    const [form, setForm] = useState({ id:null, nome:'', unidade:'ml', precoEmbalagem:'', rendimentoEmbalagem:'', qtdAdicionar:'' });

    function submit(e){
      e.preventDefault();
      if(!form.nome || !form.precoEmbalagem || !form.rendimentoEmbalagem) return alert('Preencha os campos obrigatórios');

      const pEmbalagem = Number(form.precoEmbalagem);
      const rEmbalagem = Number(form.rendimentoEmbalagem);
      const custoUnit = pEmbalagem / rEmbalagem; // Calcula o custo por ml automaticamente

      const novoId = form.id || (form.nome.toLowerCase().replace(/\s/g, '-') + '-' + uid());

      let estoqueFinal = 0;
      if (form.id) {
           // Edição: mantém estoque antigo e soma o novo se houver
           const insumoAntigo = insumos.find(i => i.id === form.id);
           estoqueFinal = insumoAntigo.estoque + (Number(form.qtdAdicionar) * rEmbalagem || 0);
      } else {
           // Novo
           estoqueFinal = (Number(form.qtdAdicionar) * rEmbalagem) || 0;
      }

      const novo = {
        ...form,
        custoUnitario: custoUnit,
        precoEmbalagem: pEmbalagem,
        rendimentoEmbalagem: rEmbalagem,
        estoque: estoqueFinal,
        id: novoId
      };

      let novos;
      if(form.id) novos = insumos.map(i=> i.id===form.id ? novo : i);
      else novos = [...insumos, novo];

      salvarInsumos(novos);
      setForm({ id:null, nome:'', unidade:'ml', precoEmbalagem:'', rendimentoEmbalagem:'', qtdAdicionar:'' });
    }

    function editar(i){
        setForm({
            id: i.id,
            nome: i.nome,
            unidade: i.unidade || 'ml',
            precoEmbalagem: i.precoEmbalagem || '',
            rendimentoEmbalagem: i.rendimentoEmbalagem || '',
            qtdAdicionar: '' // Deixa em branco para ele adicionar estoque se quiser
        });
    }

    function excluir(i){ if(!confirm(`Excluir Insumo ${i.nome}?`)) return; salvarInsumos(insumos.filter(x=>x.id!==i.id)); }

    function adicionarEstoque(insumo) {
        const rendimento = insumo.rendimentoEmbalagem || 1;
        const garrafas = prompt(`Quantas Garrafas/Pacotes de ${insumo.nome} você vai adicionar ao estoque? (Cada 1 rende ${rendimento}${insumo.unidade})`);
        if (garrafas && !isNaN(Number(garrafas)) && Number(garrafas) > 0) {
            const qtdEmMedida = Number(garrafas) * rendimento;
            const novosInsumos = insumos.map(i => i.id === insumo.id ? { ...i, estoque: i.estoque + qtdEmMedida } : i);
            salvarInsumos(novosInsumos);
        }
    }

    const custoCalculado = (form.precoEmbalagem && form.rendimentoEmbalagem) ? (Number(form.precoEmbalagem) / Number(form.rendimentoEmbalagem)) : 0;

    return (
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div className="bg-white p-5 rounded-2xl shadow h-fit border-t-4 border-terracota">
          <h3 className="font-bold mb-4 text-lg text-gray-800 flex items-center gap-2">
              <span className="text-2xl">📦</span> {form.id ? 'Editar' : 'Novo'} Insumo
          </h3>
          <form onSubmit={submit} className="space-y-4">
            <div>
                <label className="text-xs font-bold text-gray-500 uppercase">Nome da Bebida/Ingrediente</label>
                <input value={form.nome} onChange={e=>setForm({...form, nome:e.target.value})} placeholder="Ex: Cachaça Campari" className="w-full mt-1 p-3 border rounded-xl bg-gray-50 focus:ring-2 focus:ring-terracota" required />
            </div>

            <div className="flex gap-3">
                <div className="flex-1">
                    <label className="text-xs font-bold text-gray-500 uppercase">Medida Usada no Drink</label>
                    <select value={form.unidade} onChange={e=>setForm({...form, unidade:e.target.value})} className="w-full mt-1 p-3 border rounded-xl bg-gray-50 focus:ring-2 focus:ring-terracota" required>
                        <option value="ml">Mililitro (ml)</option>
                        <option value="g">Grama (g)</option>
                        <option value="un">Unidade (un)</option>
                    </select>
                </div>
                <div className="flex-1">
                    <label className="text-xs font-bold text-gray-500 uppercase">Volume da Garrafa/Pacote</label>
                    <input value={form.rendimentoEmbalagem} onChange={e=>setForm({...form, rendimentoEmbalagem:e.target.value})} placeholder="Ex: 748" type="number" step="any" className="w-full mt-1 p-3 border rounded-xl bg-gray-50 focus:ring-2 focus:ring-terracota" required />
                </div>
            </div>

            <div>
                <label className="text-xs font-bold text-gray-500 uppercase">Preço Pago na Garrafa (R$)</label>
                <input value={form.precoEmbalagem} onChange={e=>setForm({...form, precoEmbalagem:e.target.value})} placeholder="Ex: 30.00" type="number" step="0.01" className="w-full mt-1 p-3 border rounded-xl bg-gray-50 focus:ring-2 focus:ring-terracota" required />
            </div>

            {custoCalculado > 0 && (
                <div className="bg-blue-50 p-3 rounded-xl border border-blue-200 shadow-inner">
                    <div className="text-sm text-blue-800 font-bold flex justify-between">
                        <span>Custo exato por {form.unidade}:</span>
                        <span className="text-lg">{currency(custoCalculado)}</span>
                    </div>
                </div>
            )}

            <div className="border-t pt-3 mt-2">
                <label className="text-xs font-bold text-gray-500 uppercase text-terracota">Qtd. de Garrafas Compradas AGORA</label>
                <input value={form.qtdAdicionar} onChange={e=>setForm({...form, qtdAdicionar:e.target.value})} placeholder="Ex: 2 (Opcional)" type="number" step="any" className="w-full mt-1 p-3 border-2 border-orange-200 rounded-xl focus:ring-2 focus:ring-terracota" />
                {form.qtdAdicionar && form.rendimentoEmbalagem && (
                    <p className="text-xs text-orange-600 font-bold mt-1 text-right">
                        +{Number(form.qtdAdicionar) * Number(form.rendimentoEmbalagem)} {form.unidade} no estoque total
                    </p>
                )}
            </div>

            <div className="flex gap-3 pt-2">
              <button className="flex-1 py-3 bg-gradient-to-r from-terracota to-redBrown text-white rounded-xl font-bold shadow-lg hover:shadow-xl transition transform hover:-translate-y-0.5">{form.id ? 'Salvar Edição' : 'Cadastrar Insumo'}</button>
